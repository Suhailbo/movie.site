<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }

.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }

.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }

.hero { height:80vh; position:relative; }

.hero iframe {
 position:absolute;
 width:100%;
 height:100%;
}

.overlay {
 position:absolute;
 inset:0;
 background:linear-gradient(to top, black, transparent);
}

.searchPage {
 position:fixed;
 inset:0;
 background:black;
 z-index:200;
 display:none;
 overflow-y:auto;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed w-full bg-black flex justify-between p-4 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>

<input id="searchInput"
placeholder="Search movies..."
class="bg-gray-900 border border-gray-600 px-4 py-2 rounded w-1/2 text-white placeholder-gray-400 focus:outline-none focus:border-white">
</nav>

<!-- SEARCH PAGE -->
<div id="searchPage" class="searchPage pt-20 px-4">
<button onclick="closeSearch()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Back</button>
<h2 class="text-2xl mb-4">Search Results</h2>
<div id="searchResults" class="space-y-4"></div>
</div>

<!-- MOVIE PAGE -->
<div id="moviePage" class="searchPage pt-20 px-4" style="display:none;">
<button onclick="closeMoviePage()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Back</button>
<div id="movieDetails"></div>
</div>

<!-- HOME -->
<div id="homePage">

<div class="hero mt-16">
<iframe id="heroVideo" src="" allow="autoplay"></iframe>
<div class="overlay"></div>

<div class="absolute bottom-10 left-6">
<h1 id="heroTitle" class="text-4xl font-bold"></h1>
<p id="heroDesc" class="max-w-lg text-gray-300"></p>
<button onclick="openMovie(heroMovie)" class="mt-3 bg-white text-black px-4 py-2">
▶ Watch Trailer
</button>
</div>
</div>

<div class="px-4">

<h2 class="text-xl mt-4 mb-2">🔥 Top 10</h2>
<div id="top10" class="scroll mb-4"></div>

<div class="text-center my-4">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="rows"></div>

</div>
</div>

<!-- FOOTER -->
<footer class="bg-black text-gray-400 mt-10 px-6 py-10 border-t border-gray-800">
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">

<div>
<h2 class="text-white font-bold mb-3">🎬 MovieHub</h2>
<p>Explore trending movies worldwide.</p>
</div>

<div>
<h3 class="text-white mb-3">Links</h3>
<ul class="space-y-2">
<li onclick="goHome()">Home</li>
<li>Categories</li>
</ul>
</div>

<div>
<h3 class="text-white mb-3">Feedback</h3>

<form action="https://formsubmit.co/eh710214@gmail.com" method="POST">
<input type="text" name="name" placeholder="Name" class="w-full mb-2 bg-gray-800 p-2">
<input type="email" name="email" placeholder="Email" class="w-full mb-2 bg-gray-800 p-2">
<textarea name="message" placeholder="Feedback" class="w-full mb-2 bg-gray-800 p-2"></textarea>
<button class="bg-white text-black px-4 py-2 w-full">Send</button>
<input type="hidden" name="_captcha" value="false">
</form>

</div>

</div>

<div class="text-center mt-6">
<p>© 2026 MovieHub | +2349049696168</p>
</div>
</footer>

<script>

const API_KEY="2b670b583329b90bcbad43227626c5f9";

// SEARCH
searchInput.onfocus=()=> searchPage.style.display="block";

searchInput.oninput=async()=>{
 const q=searchInput.value;
 if(q.length<2){ searchResults.innerHTML=""; return; }

 const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 const data=await res.json();

 searchResults.innerHTML=data.results.map(m=>`
 <div class="flex gap-4 bg-gray-900 p-3 rounded cursor-pointer">
 <img src="https://image.tmdb.org/t/p/w200${m.poster_path}" class="w-24">
 <div>
 <h3>${m.title}</h3>
 <p class="text-sm text-gray-400">${m.overview||""}</p>
 </div>
 </div>`).join("");

 document.querySelectorAll("#searchResults > div").forEach((el,i)=>{
  el.onclick=()=>openMovie(data.results[i]);
 });
};

function closeSearch(){
 searchPage.style.display="none";
}

// TRAILER
async function getTrailer(id){
 const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 return data.results.find(v=>v.type==="Trailer")?.key;
}

// STREAMING DETECTION
async function getProviders(id){
 const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/watch/providers?api_key=${API_KEY}`);
 const data=await res.json();
 return data.results?.NG?.flatrate || [];
}

// OPEN MOVIE PAGE
async function openMovie(m){

 searchPage.style.display="none";
 moviePage.style.display="block";

 const trailer=await getTrailer(m.id);
 const providers=await getProviders(m.id);

 const providerHTML=providers.map(p=>`
 <span class="bg-gray-700 px-3 py-1 rounded">${p.provider_name}</span>
 `).join("") || "Not available";

 movieDetails.innerHTML=`
 <div class="flex flex-col md:flex-row gap-6">

 <img src="https://image.tmdb.org/t/p/w400${m.poster_path}" class="rounded w-full md:w-1/3">

 <div>
 <h1 class="text-3xl font-bold">${m.title}</h1>
 <p class="text-yellow-400">⭐ ${m.vote_average}</p>
 <p class="text-gray-300 my-3">${m.overview||""}</p>

 <div class="flex gap-2 flex-wrap mb-3">
 ${providerHTML}
 </div>

 <button onclick="playTrailer('${trailer}')" class="bg-white text-black px-4 py-2">
 ▶ Watch Trailer
 </button>

 <div id="trailerBox" class="mt-4"></div>

 </div>
 </div>`;
}

function playTrailer(key){
 if(!key) return alert("No trailer");

 trailerBox.innerHTML=`
 <iframe width="100%" height="300"
 src="https://www.youtube.com/embed/${key}?autoplay=1"></iframe>`;
}

function closeMoviePage(){
 moviePage.style.display="none";
}

// HERO + LOAD
async function load(){

 const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

 const hero=trending.results[0];
 heroTitle.innerText=hero.title;
 heroDesc.innerText=hero.overview;

 const t=await getTrailer(hero.id);
 if(t) heroVideo.src=`https://www.youtube.com/embed/${t}?autoplay=1&mute=1`;

 top10.innerHTML=trending.results.slice(0,10).map(m=>`
 <div class="card" onclick='openMovie(${JSON.stringify(m)})'>
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 </div>`).join("");
}

window.onload=load;

</script>

</body>
</html>
