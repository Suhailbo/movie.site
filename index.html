<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }

.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }

.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }

.hero iframe { width:100%; height:220px; }
.hero { margin-bottom:10px; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/80 backdrop-blur flex justify-between items-center p-3 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search movies..."
class="bg-gray-900 px-3 py-1 rounded text-sm w-1/2">
</nav>

<!-- TOP BANNER -->
<div class="text-center py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-sm font-bold">
🔥 Unlimited Movies • Trailers • Recommendations
</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeSearch()" class="mb-4 text-lg">← Back</button>
<input id="searchInput2" class="w-full bg-gray-900 p-3 mb-4 rounded" placeholder="Search movies...">
<div id="searchResults"></div>
</div>

<!-- MOVIE PAGE -->
<div id="moviePage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeMoviePage()" class="mb-4 text-lg">← Back</button>
<div id="movieDetails"></div>

<h2 class="mt-8 text-xl font-bold">🤖 Recommended</h2>
<div id="recommendations" class="scroll mt-3"></div>
</div>

<!-- HOME -->
<div id="homePage">

<!-- HERO -->
<div class="hero">
<iframe id="heroVideo" allow="autoplay" frameborder="0"></iframe>
</div>

<!-- HERO TEXT -->
<div class="px-4 mt-2">
<h1 id="heroTitle" class="text-2xl font-bold"></h1>
<p id="heroDesc" class="text-gray-300 text-sm mt-1 line-clamp-2"></p>

<div class="flex gap-3 mt-3">
<button onclick="openMovie(heroMovie)" class="flex-1 bg-white text-black py-2 rounded">▶ Trailer</button>
<button onclick="openMovie(heroMovie)" class="flex-1 bg-green-600 py-2 rounded">📥 Watch</button>
</div>
</div>

<!-- ADS -->
<div class="my-4 px-4 text-center max-w-4xl mx-auto">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>
(adsbygoogle = window.adsbygoogle || []).push({});
</script>
</div>

<!-- CONTENT -->
<div class="px-4 mt-3">

<h2 class="text-lg mb-2">🔥 Top 10</h2>
<div id="top10" class="scroll mb-4"></div>

<div id="rows"></div>

</div>
</div>

<!-- FOOTER -->
<footer class="bg-black border-t border-gray-800 mt-10 px-6 py-8 text-sm">
<div class="grid md:grid-cols-3 gap-6">

<div>
<h2 class="font-bold">🎬 MovieHub</h2>
<p class="text-gray-400">Discover movies & trailers</p>
</div>

<div>
<h3 class="mb-2">Links</h3>
<ul class="text-gray-400 space-y-1">
<li onclick="goHome()" class="cursor-pointer">Home</li>
</ul>
</div>

<div>
<h3 class="mb-2">Feedback</h3>
<form action="https://formsubmit.co/eh710214@gmail.com" method="POST">
<input name="name" placeholder="Name" class="w-full mb-2 bg-gray-800 p-2 rounded text-sm">
<input name="email" placeholder="Email" class="w-full mb-2 bg-gray-800 p-2 rounded text-sm">
<textarea name="message" placeholder="Message" class="w-full mb-2 bg-gray-800 p-2 rounded text-sm"></textarea>
<button class="bg-white text-black w-full p-2 rounded">Send</button>
<input type="hidden" name="_captcha" value="false">
</form>
</div>

</div>

<div class="text-center text-gray-500 mt-8 text-xs">© 2026 MovieHub</div>
</footer>

<script>
const API_KEY="2b670b583329b90bcbad43227626c5f9";

let heroMovie;

const homePage=document.getElementById('homePage');
const searchPage=document.getElementById('searchPage');
const moviePage=document.getElementById('moviePage');
const searchInput=document.getElementById('searchInput');
const searchInput2=document.getElementById('searchInput2');
const searchResults=document.getElementById('searchResults');
const top10=document.getElementById('top10');
const rows=document.getElementById('rows');
const recommendations=document.getElementById('recommendations');
const movieDetails=document.getElementById('movieDetails');

function goHome(){
moviePage.classList.add('hidden');
searchPage.classList.add('hidden');
homePage.style.display='block';
}

function closeSearch(){ searchPage.classList.add('hidden'); }

function closeMoviePage(){
moviePage.classList.add('hidden');
homePage.style.display='block';
}

// SEARCH
searchInput.onclick=()=> searchPage.classList.remove('hidden');

searchInput.oninput=e=>{
searchInput2.value=e.target.value;
runSearch(e.target.value);
};

searchInput2.oninput=e=>{
searchInput.value=e.target.value;
runSearch(e.target.value);
};

async function runSearch(q){
if(q.length<2){ searchResults.innerHTML=""; return; }

const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(q)}`);
const data=await res.json();

searchResults.innerHTML=data.results.map(m=>`
<div class="flex gap-3 bg-gray-900 p-3 mb-3 rounded cursor-pointer">
<img src="${m.poster_path ? `https://image.tmdb.org/t/p/w200${m.poster_path}` : 'https://via.placeholder.com/200x300'}" class="w-16 rounded">
<div>
<h3>${m.title}</h3>
<p class="text-gray-400 text-sm">${m.release_date || ''}</p>
</div>
</div>
`).join("");

document.querySelectorAll("#searchResults > div").forEach((el,i)=>{
el.onclick=()=>{ closeSearch(); openMovie(data.results[i]); };
});
}

// MOVIE
async function openMovie(m){
homePage.style.display="none";
moviePage.classList.remove('hidden');

const vid=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const trailer=vid.results.find(v=>v.type==="Trailer");

const watchLink=`https://www.justwatch.com/ng/search?q=${encodeURIComponent(m.title)}`;

movieDetails.innerHTML=`
<img src="${m.poster_path ? `https://image.tmdb.org/t/p/w400${m.poster_path}` : ''}" class="w-full rounded mb-4">

<h1 class="text-3xl font-bold">${m.title}</h1>
<p class="text-yellow-400">⭐ ${m.vote_average}</p>
<p class="text-gray-300 my-4">${m.overview||""}</p>

<div class="flex gap-3">
<button onclick="playTrailer('${trailer?.key}')" class="flex-1 bg-white text-black py-3 rounded">▶ Trailer</button>
<a href="${watchLink}" target="_blank" class="flex-1 bg-green-600 py-3 rounded text-center">📥 Watch</a>
</div>

<div id="trailerBox" class="mt-6"></div>
`;

const rec=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/recommendations?api_key=${API_KEY}`).then(r=>r.json());

recommendations.innerHTML=rec.results.slice(0,10).map(r=>`
<div class="card" onclick='openMovie(${JSON.stringify(r)})'>
<img src="https://image.tmdb.org/t/p/w300${r.poster_path}">
</div>
`).join("");
}

function playTrailer(key){
if(!key) return alert("No trailer");

document.getElementById("trailerBox").innerHTML=`
<iframe width="100%" height="250"
src="https://www.youtube.com/embed/${key}?autoplay=1"></iframe>`;
}

// LOAD
async function load(){

const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

heroMovie=trending.results[0];

heroTitle.innerText=heroMovie.title;
heroDesc.innerText=heroMovie.overview;

const t=await fetch(`https://api.themoviedb.org/3/movie/${heroMovie.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const trailer=t.results.find(v=>v.type==="Trailer");

if(trailer) heroVideo.src=`https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1`;

top10.innerHTML=trending.results.slice(0,10).map(m=>`
<div class="card" onclick='openMovie(${JSON.stringify(m)})'>
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
</div>
`).join("");

// CATEGORIES FIXED
const genres=[
["Action",28],["Comedy",35],["Horror",27],
["Drama",18],["Animation",16],["Thriller",53]
];

rows.innerHTML="";

for(const [name,id] of genres){

const res=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
const data=await res.json();

const section=document.createElement('div');

section.innerHTML=`
<h2 class="mt-6 mb-2 font-bold">${name}</h2>
<div class="scroll mb-4"></div>
`;

rows.appendChild(section);

const scrollDiv=section.querySelector('.scroll');

data.results.forEach(m=>{
const card=document.createElement('div');
card.className='card';
card.innerHTML=`<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">`;
card.onclick=()=>openMovie(m);
scrollDiv.appendChild(card);
});
}
}

window.onload=load;
</script>

</body>
</html>
