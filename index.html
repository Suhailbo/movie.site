<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub V6 ULTRA FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }
.hero iframe { width:100%; height:230px; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/80 backdrop-blur flex justify-between items-center p-3 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search movies..." class="bg-gray-900 px-3 py-1 rounded text-sm w-1/2">
</nav>

<div class="text-center py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-sm font-bold">
🔥 Unlimited Movies • Trailers • Recommendations
</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeSearch()">← Back</button>
<input id="searchInput2" class="w-full bg-gray-900 p-3 my-3 rounded">
<div id="searchResults"></div>
</div>

<!-- MOVIE -->
<div id="moviePage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeMoviePage()">← Back</button>
<div id="movieDetails"></div>
<h2 class="mt-6 text-xl font-bold">🤖 Recommended</h2>
<div id="recommendations" class="scroll mt-3"></div>
</div>

<!-- SECTION PAGE -->
<div id="sectionPage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeSection()">← Back</button>
<h1 id="sectionTitle" class="text-xl font-bold my-3"></h1>
<div id="sectionContent"></div>
</div>

<!-- LEGAL -->
<div id="legalPage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closePage()">← Back</button>
<div id="legalContent"></div>
</div>

<!-- HOME -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo" allow="autoplay" frameborder="0"></iframe>
</div>

<div class="px-4 mt-2">
<h1 id="heroTitle" class="text-2xl font-bold"></h1>
<p id="heroDesc" class="text-gray-300 text-sm mt-1"></p>

<div class="flex gap-3 mt-3">
<button onclick="openMovie(heroMovie)" class="flex-1 bg-white text-black py-2 rounded">▶ Trailer</button>
<button onclick="openMovie(heroMovie)" class="flex-1 bg-green-600 py-2 rounded">📥 Watch</button>
</div>
</div>

<!-- NAV LINKS -->
<div class="px-4 mt-4 flex gap-4 overflow-x-auto text-sm font-medium">
<span onclick="openSection('top5')" class="cursor-pointer text-purple-400">Top 5 Movies</span>
<span onclick="openSection('platforms')" class="cursor-pointer text-purple-400">Streaming Platforms</span>
<span onclick="openSection('netflix')" class="cursor-pointer text-purple-400">On Netflix</span>
<span onclick="openSection('upcoming')" class="cursor-pointer text-purple-400">Coming Soon</span>
</div>

<!-- ADS -->
<div class="my-4 px-4 text-center">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- CONTENT -->
<div class="px-4">

<h2>🔥 Top 10</h2>
<div id="top10" class="scroll mb-6"></div>

<div id="rows"></div>

</div>
</div>

<!-- FOOTER -->
<footer class="bg-black border-t border-gray-800 mt-10 px-6 py-8 text-sm">
<div class="grid grid-cols-2 gap-6">
<div>
<h2 class="font-bold">🎬 MovieHub</h2>
<p class="text-gray-400">Discover movies & trailers</p>
</div>

<div>
<h3>Legal</h3>
<ul class="text-gray-400">
<li onclick="openPage('privacy')">Privacy</li>
<li onclick="openPage('terms')">Terms</li>
<li onclick="openPage('feedback')">Feedback</li>
</ul>
</div>
</div>

<div class="text-center text-gray-500 mt-6 text-xs">
© 2026 MovieHub
</div>
</footer>

<script>
const API_KEY="fc53416dd4f13229c0a99225cf54033c";

let heroMovie;

function stopAllVideos(){
document.querySelectorAll("iframe").forEach(v=>v.src=v.src);
}

function goHome(){
stopAllVideos();
moviePage.classList.add("hidden");
sectionPage.classList.add("hidden");
searchPage.classList.add("hidden");
homePage.style.display="block";
}

function closeMoviePage(){
stopAllVideos();
moviePage.classList.add("hidden");
homePage.style.display="block";
}

function closeSearch(){
searchPage.classList.add("hidden");
}

searchInput.onclick=()=>searchPage.classList.remove("hidden");

searchInput.oninput=e=>{
searchInput2.value=e.target.value;
runSearch(e.target.value);
};

searchInput2.oninput=e=>{
searchInput.value=e.target.value;
runSearch(e.target.value);
};

async function runSearch(q){
if(q.length<2)return searchResults.innerHTML="";
const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
const data=await res.json();
searchResults.innerHTML=data.results.map(m=>`
<div onclick='openMovie(${JSON.stringify(m)})' class="flex gap-3 bg-gray-900 p-3 mb-3 rounded cursor-pointer">
<img src="https://image.tmdb.org/t/p/w200${m.poster_path}" class="w-16 rounded">
<div>${m.title}</div>
</div>`).join("");
}

function card(m){
if(!m.poster_path)return "";
return `<div class="card" onclick='openMovie(${JSON.stringify(m)})'>
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
</div>`;
}

async function openMovie(m){
homePage.style.display="none";
moviePage.classList.remove("hidden");

const vid=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const trailer=vid.results.find(v=>v.type==="Trailer");

const prov=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/watch/providers?api_key=${API_KEY}`).then(r=>r.json());
const providers=prov.results?.NG?.flatrate || [];

movieDetails.innerHTML=`
<img src="https://image.tmdb.org/t/p/w400${m.poster_path}" class="mb-4 rounded">
<h1 class="text-2xl font-bold">${m.title}</h1>
<p class="text-yellow-400">⭐ ${m.vote_average}</p>
<p class="my-3">${m.overview||""}</p>

<h3 class="mt-3 font-bold">📺 Watch On</h3>
<div class="flex gap-2 flex-wrap mt-2">
${providers.length ? providers.map(p=>`
<a href="https://www.justwatch.com/ng/search?q=${encodeURIComponent(m.title)}" target="_blank"
class="bg-gray-800 px-3 py-2 rounded flex items-center gap-2">
<img src="https://image.tmdb.org/t/p/w45${p.logo_path}" class="w-5">
${p.provider_name}
</a>`).join("") : "<p class='text-gray-400'>Not available</p>"}
</div>

<button onclick="playTrailer('${trailer?.key}')" class="bg-white text-black px-4 py-2 mt-3 rounded">▶ Trailer</button>
<div id="trailerBox" class="mt-4"></div>
`;

loadRec(m.id);
}

function playTrailer(k){
if(!k)return alert("No trailer");
trailerBox.innerHTML=`<iframe width="100%" height="250" src="https://www.youtube.com/embed/${k}?autoplay=1"></iframe>`;
}

async function loadRec(id){
const r=await fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`);
const d=await r.json();
recommendations.innerHTML=d.results.slice(0,10).map(card).join("");
}

/* SECTION PAGE */

function openSection(type){
homePage.style.display="none";
sectionPage.classList.remove("hidden");
sectionContent.innerHTML="Loading...";

if(type==="top5"){ sectionTitle.innerText="Top 5 Movies"; loadTop5(); }
if(type==="platforms"){ sectionTitle.innerText="Streaming Platforms"; loadPlatforms(); }
if(type==="netflix"){ sectionTitle.innerText="On Netflix"; loadNetflix(); }
if(type==="upcoming"){ sectionTitle.innerText="Coming Soon"; loadUpcoming(); }
}

function closeSection(){
sectionPage.classList.add("hidden");
homePage.style.display="block";
}

async function loadTop5(){
const r=await fetch(`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`);
const d=await r.json();
sectionContent.innerHTML=d.results.slice(0,5).map(card).join("");
}

function loadPlatforms(){
sectionContent.innerHTML=`
<div class="flex gap-3 flex-wrap">
<button onclick="loadByProvider(8)" class="bg-gray-800 px-4 py-2 rounded">Netflix</button>
<button onclick="loadByProvider(9)" class="bg-gray-800 px-4 py-2 rounded">Prime</button>
<button onclick="loadByProvider(337)" class="bg-gray-800 px-4 py-2 rounded">Disney+</button>
</div>
<div id="providerResults" class="scroll mt-4"></div>`;
}

async function loadByProvider(id){
const res=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_watch_providers=${id}&watch_region=NG`);
const d=await res.json();
document.getElementById("providerResults").innerHTML=d.results.map(card).join("");
}

async function loadNetflix(){
const r=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_watch_providers=8&watch_region=NG`);
const d=await r.json();
sectionContent.innerHTML=d.results.map(card).join("");
}

async function loadUpcoming(){
const r=await fetch(`https://api.themoviedb.org/3/movie/upcoming?api_key=${API_KEY}`);
const d=await r.json();
sectionContent.innerHTML=d.results.map(card).join("");
}

/* LOAD */
async function load(){
const t=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

heroMovie = t.results[Math.floor(Math.random()*t.results.length)];
heroTitle.innerText=heroMovie.title;
heroDesc.innerText=heroMovie.overview;

const v=await fetch(`https://api.themoviedb.org/3/movie/${heroMovie.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const tr=v.results.find(x=>x.type==="Trailer");
if(tr)heroVideo.src=`https://www.youtube.com/embed/${tr.key}?autoplay=1&mute=1`;

top10.innerHTML=t.results.slice(0,10).map(card).join("");

const genres=[
["Action",28],["Adventure",12],["Animation",16],["Comedy",35],
["Crime",80],["Documentary",99],["Drama",18],["Family",10751],
["Fantasy",14],["History",36],["Horror",27],["Music",10402],
["Mystery",9648],["Romance",10749],["Sci-Fi",878],["TV Movie",10770],
["Thriller",53],["War",10752],["Western",37]
];

rows.innerHTML="";
for(const [n,id] of genres){
const r=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
const d=await r.json();
rows.innerHTML+=`<h2 class="mt-6 font-bold">${n}</h2><div class="scroll mb-6">${d.results.map(card).join("")}</div>`;
}
}

window.onload=load;
</script>

</body>
</html>
