<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub V7 FINAL</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }
.gridMovies { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
.hero iframe { width:100%; height:230px; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/80 backdrop-blur flex justify-between items-center p-3 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search..." class="bg-gray-900 px-3 py-1 rounded text-sm w-1/2">
</nav>

<!-- HERO -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo" allow="autoplay" frameborder="0"></iframe>
</div>

<div class="px-4 mt-2">
<h1 id="heroTitle" class="text-2xl font-bold"></h1>
<p id="heroDesc" class="text-gray-300 text-sm mt-1"></p>

<button onclick="openMovie(heroMovie)" class="bg-white text-black px-4 py-2 mt-3 rounded">▶ Watch</button>
</div>

<!-- MENU LINKS -->
<div class="px-4 mt-6 space-y-3 text-lg">
<div onclick="openSection('top5')" class="cursor-pointer">🏆 Top 5 Movies</div>
<div onclick="openSection('providers')" class="cursor-pointer">📺 Streaming Platforms</div>
<div onclick="openSection('netflix')" class="cursor-pointer">🔥 On Netflix</div>
<div onclick="openSection('upcoming')" class="cursor-pointer">⏳ Coming Soon</div>
</div>

<!-- ADS -->
<div class="my-4 px-4 text-center">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- TOP 10 -->
<div class="px-4">
<h2>🔥 Top 10</h2>
<div id="top10" class="scroll"></div>
</div>

<!-- CATEGORIES -->
<div id="rows" class="px-4 mt-6"></div>

</div>

<!-- SECTION PAGE -->
<div id="sectionPage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeSection()">← Back</button>
<h1 id="sectionTitle" class="text-xl font-bold mt-2 mb-4"></h1>
<div id="sectionMovies" class="gridMovies"></div>
</div>

<!-- MOVIE PAGE -->
<div id="moviePage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeMovie()">← Back</button>
<div id="movieDetails"></div>
</div>

<!-- FOOTER -->
<footer class="bg-black border-t border-gray-800 mt-10 px-6 py-8 text-sm">
<p class="text-gray-400">© MovieHub 2026</p>
</footer>

<script>
const API_KEY="fc53416dd4f13229c0a99225cf54033c";

let heroMovie;

// STOP SOUND
function stopVideos(){
document.querySelectorAll("iframe").forEach(v=>v.src=v.src);
}

// NAV
function goHome(){
stopVideos();
sectionPage.classList.add("hidden");
moviePage.classList.add("hidden");
homePage.style.display="block";
}

function closeMovie(){
stopVideos();
moviePage.classList.add("hidden");
homePage.style.display="block";
}

function closeSection(){
sectionPage.classList.add("hidden");
homePage.style.display="block";
}

// HERO RANDOM
async function loadHero(list){
heroMovie = list[Math.floor(Math.random()*list.length)];

heroTitle.innerText = heroMovie.title;
heroDesc.innerText = heroMovie.overview;

const v = await fetch(`https://api.themoviedb.org/3/movie/${heroMovie.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const tr = v.results.find(x=>x.type==="Trailer");
if(tr) heroVideo.src=`https://www.youtube.com/embed/${tr.key}?autoplay=1&mute=1`;
}

// CARD
function card(m){
return `
<div class="bg-gray-900 p-2 rounded">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}" onclick='openMovie(${JSON.stringify(m)})'>
<h2 class="text-sm mt-2">${m.title}</h2>
<p class="text-xs text-gray-400">${(m.overview||"").slice(0,60)}...</p>
<button onclick='openMovie(${JSON.stringify(m)})' class="bg-white text-black w-full mt-2 py-1 rounded">Watch</button>
</div>`;
}

// SECTION LOAD
async function openSection(type){
homePage.style.display="none";
sectionPage.classList.remove("hidden");

let url="", title="";

if(type==="top5"){
title="Top 5 Movies";
url=`https://api.themoviedb.org/3/trending/movie/day?api_key=${API_KEY}`;
}

if(type==="netflix"){
title="On Netflix";
url=`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_watch_providers=8&watch_region=NG`;
}

if(type==="upcoming"){
title="Coming Soon";
url=`https://api.themoviedb.org/3/movie/upcoming?api_key=${API_KEY}`;
}

sectionTitle.innerText=title;

const res=await fetch(url);
const data=await res.json();

sectionMovies.innerHTML=data.results.slice(0,12).map(card).join("");
}

// MOVIE PAGE
async function openMovie(m){
homePage.style.display="none";
moviePage.classList.remove("hidden");

const prov=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/watch/providers?api_key=${API_KEY}`).then(r=>r.json());

const providers = prov.results?.NG?.flatrate || [];

let providerHTML = providers.length ?
providers.map(p=>`
<button onclick="openApp('${p.provider_name}')" class="bg-green-600 px-3 py-2 rounded m-1">
${p.provider_name}
</button>`).join("") :
"<p class='text-gray-400'>Not available</p>";

movieDetails.innerHTML=`
<img src="https://image.tmdb.org/t/p/w400${m.poster_path}" class="rounded mb-3">

<h1 class="text-xl font-bold">${m.title}</h1>
<p class="text-sm mt-2">${m.overview}</p>

<h3 class="mt-4">Watch on:</h3>
<div class="mt-2">${providerHTML}</div>
`;
}

// OPEN STREAMING APPS
function openApp(name){
if(name.includes("Netflix")) window.location="nflx://"; 
else if(name.includes("Disney")) window.location="disneyplus://";
else if(name.includes("Amazon")) window.location="primevideo://";
else window.alert("App not installed");
}

// LOAD ALL
async function load(){
const t=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

loadHero(t.results);

top10.innerHTML=t.results.slice(0,10).map(m=>`
<img src="https://image.tmdb.org/t/p/w200${m.poster_path}" onclick='openMovie(${JSON.stringify(m)})'>
`).join("");

// CATEGORIES
const genres=[["Action",28],["Comedy",35],["Horror",27],["Romance",10749]];
rows.innerHTML="";
for(const [n,id] of genres){
const r=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
const d=await r.json();

rows.innerHTML+=`
<h2 class="mt-6">${n}</h2>
<div class="scroll">${d.results.map(m=>`
<img src="https://image.tmdb.org/t/p/w200${m.poster_path}" onclick='openMovie(${JSON.stringify(m)})'>
`).join("")}</div>`;
}
}

window.onload=load;
</script>

</body>
</html>
