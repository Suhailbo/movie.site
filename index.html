<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }

.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }

.movie-card { min-width:150px; cursor:pointer; transition:0.3s; }
.movie-card:hover { transform:scale(1.1); }

.hero {
  height:65vh;
  display:flex;
  align-items:flex-end;
  padding:30px;
  background-size:cover;
  position:relative;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-black/90 p-4 flex justify-between items-center z-50">
  <h1 class="text-2xl font-bold">MovieHub</h1>
  <div class="flex gap-3">
    <button onclick="openWatchlist()">❤️</button>
    <input onclick="openSearchPage()" placeholder="Search..."
      class="bg-zinc-800 px-4 py-2 rounded-full cursor-pointer">
  </div>
</nav>

<div id="mainPage" class="pt-16">

<!-- TOP AD -->
<div class="p-4 flex justify-center">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1234567890"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
</div>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<!-- HERO -->
<div id="hero" class="hero">
  <div>
    <h1 id="heroTitle" class="text-4xl font-bold mb-3"></h1>
    <button onclick="playHeroTrailer()" class="bg-white text-black px-6 py-3 rounded-xl">
      ▶ Watch Trailer
    </button>
  </div>

  <iframe id="heroTrailer"
    class="absolute inset-0 w-full h-full hidden"
    allow="autoplay; encrypted-media"
    allowfullscreen></iframe>
</div>

<!-- ROWS -->
<div id="rows" class="p-4"></div>

</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black p-4 z-50">
  <button onclick="closeSearchPage()">←</button>
  <input id="searchInputFull" class="w-full p-3 my-4 bg-zinc-800 rounded" placeholder="Search...">
  <div id="searchResults" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</div>

<!-- WATCHLIST -->
<div id="watchlistPage" class="hidden fixed inset-0 bg-black p-6 z-50">
  <button onclick="closeWatchlist()">←</button>
  <h1 class="text-2xl mb-4">My Watchlist</h1>
  <div id="watchlistGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</div>

<!-- DETAILS -->
<div id="detailsPage" class="hidden fixed inset-0 bg-black p-6 z-50">
  <button onclick="closeDetailsPage()">←</button>
  <img id="detailsPoster" class="w-56 rounded my-4">
  <h1 id="detailsTitle" class="text-2xl font-bold"></h1>
  <p id="detailsOverview" class="text-gray-400"></p>

  <!-- DETAILS AD -->
  <div class="my-4 flex justify-center">
    <ins class="adsbygoogle"
    style="display:block"
    data-ad-client="ca-pub-2257272049115568"
    data-ad-slot="1234567890"
    data-ad-format="auto"></ins>
  </div>
  <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

  <div class="flex gap-3 mt-4 flex-wrap">
    <button onclick="playTrailerFromDetails()" class="bg-red-600 px-5 py-3 rounded">▶ Trailer</button>
    <button onclick="toggleWatchlist(currentMovie)" class="bg-white text-black px-5 py-3 rounded">❤️ Save</button>

    <button onclick="openPlatform('netflix')" class="bg-red-700 px-4 py-2 rounded">Netflix</button>
    <button onclick="openPlatform('prime')" class="bg-blue-600 px-4 py-2 rounded">Prime</button>
    <button onclick="openPlatform('disney')" class="bg-indigo-600 px-4 py-2 rounded">Disney+</button>
  </div>
</div>

<!-- TRAILER -->
<div id="trailerModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
  <div class="w-full max-w-3xl relative">
    <button onclick="closeTrailer()" class="absolute -top-10 right-0 text-2xl">✕</button>
    <iframe id="trailerFrame" class="w-full aspect-video" allowfullscreen></iframe>
  </div>
</div>

<script>
const API_KEY="PUT_YOUR_API_KEY";
let currentMovie=null;
let watchlist=JSON.parse(localStorage.getItem("watchlist")||"[]");

const rowsData=[
{title:"Trending",url:`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`},
{title:"Top Rated",url:`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`},
{title:"Action",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`},
{title:"Anime",url:`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_original_language=ja`},
{title:"K-Drama",url:`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_origin_country=KR`}
];

async function fetchMovies(url){
const res=await fetch(url);
return (await res.json()).results||[];
}

function createCard(movie){
const poster=movie.poster_path
?`https://image.tmdb.org/t/p/w300${movie.poster_path}`
:"https://via.placeholder.com/300x450";

return `<div class="movie-card">
<img src="${poster}" class="rounded">
</div>`;
}

async function loadRows(){
rows.innerHTML="";

for(let row of rowsData){
const movies=await fetchMovies(row.url);

const rowDiv=document.createElement("div");
rowDiv.innerHTML=`
<h2 class="mb-2">${row.title}</h2>
<div class="scroll">${movies.map(createCard).join("")}</div>

<!-- MID AD -->
<div class="my-6 flex justify-center">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1234567890"
data-ad-format="auto"></ins>
</div>
`;

rows.appendChild(rowDiv);
(adsbygoogle = window.adsbygoogle || []).push({});

rowDiv.querySelectorAll(".movie-card").forEach((card,i)=>{
card.onclick=()=>showDetails(movies[i]);
});

if(row.title==="Trending") setHero(movies[0]);
}
}

async function setHero(movie){
currentMovie=movie;

hero.style.backgroundImage=
`linear-gradient(to bottom, rgba(0,0,0,0.7), black),
url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;

heroTitle.textContent=movie.title||movie.name;

heroTrailer.classList.add("hidden");
heroTrailer.src="";

setTimeout(async ()=>{
const type=movie.title?"movie":"tv";

const res=await fetch(`https://api.themoviedb.org/3/${type}/${movie.id}/videos?api_key=${API_KEY}`);
const data=await res.json();

const vid=data.results.find(v=>v.site==="YouTube"&&v.type==="Trailer");
if(!vid)return;

heroTrailer.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1&mute=1&controls=0&loop=1&playlist=${vid.key}`;
heroTrailer.classList.remove("hidden");

},10000);
}

function showDetails(movie){
currentMovie=movie;
mainPage.classList.add("hidden");
detailsPage.classList.remove("hidden");

detailsPoster.src=movie.poster_path
?`https://image.tmdb.org/t/p/w500${movie.poster_path}`:"";

detailsTitle.textContent=movie.title||movie.name;
detailsOverview.textContent=movie.overview;
}

function closeDetailsPage(){
detailsPage.classList.add("hidden");
mainPage.classList.remove("hidden");
}

function openSearchPage(){
mainPage.classList.add("hidden");
searchPage.classList.remove("hidden");
}
function closeSearchPage(){
searchPage.classList.add("hidden");
mainPage.classList.remove("hidden");
searchResults.innerHTML="";
}

searchInputFull.addEventListener("input",async e=>{
const q=e.target.value.trim();
if(q.length<3)return;

const res=await fetchMovies(
`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${encodeURIComponent(q)}`
);

searchResults.innerHTML=res.map(createCard).join('');

searchResults.querySelectorAll(".movie-card").forEach((card,i)=>{
card.onclick=()=>showDetails(res[i]);
});
});

async function playTrailerFromDetails(){
const type=currentMovie.title?"movie":"tv";
const res=await fetch(`https://api.themoviedb.org/3/${type}/${currentMovie.id}/videos?api_key=${API_KEY}`);
const data=await res.json();

const vid=data.results.find(v=>v.type==="Trailer")||data.results[0];
if(!vid)return alert("No trailer");

trailerFrame.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1`;
trailerModal.classList.remove("hidden");
}

function playHeroTrailer(){ playTrailerFromDetails(); }

function closeTrailer(){
trailerModal.classList.add("hidden");
trailerFrame.src="";
}

function toggleWatchlist(movie){
const exist=watchlist.find(m=>m.id===movie.id);
if(exist) watchlist=watchlist.filter(m=>m.id!==movie.id);
else watchlist.push(movie);

localStorage.setItem("watchlist",JSON.stringify(watchlist));
}

function openWatchlist(){
mainPage.classList.add("hidden");
watchlistPage.classList.remove("hidden");

watchlistGrid.innerHTML=watchlist.map(createCard).join('');
watchlistGrid.querySelectorAll(".movie-card").forEach((card,i)=>{
card.onclick=()=>showDetails(watchlist[i]);
});
}

function closeWatchlist(){
watchlistPage.classList.add("hidden");
mainPage.classList.remove("hidden");
}

function openPlatform(platform){
const title=encodeURIComponent(currentMovie.title||currentMovie.name);

if(platform==="netflix") window.open(`https://www.netflix.com/search?q=${title}`);
if(platform==="prime") window.open(`https://www.primevideo.com/search/ref=atv_nb_sr?phrase=${title}`);
if(platform==="disney") window.open(`https://www.disneyplus.com/search?q=${title}`);
}

window.onload=loadRows;
</script>

</body>
</html>
