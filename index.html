‚Äé<!DOCTYPE html>
‚Äé<html lang="en">
‚Äé<head>
‚Äé  <meta charset="UTF-8">
‚Äé  <title>MovieHub</title>
‚Äé
‚Äé  <style>
‚Äé    body {
‚Äé      background: #0f0f0f;
‚Äé      color: white;
‚Äé      font-family: Arial;
‚Äé      margin: 0;
‚Äé    }
‚Äé
‚Äé    h1 {
‚Äé      text-align: center;
‚Äé      padding: 20px;
‚Äé    }
‚Äé
‚Äé    .movies {
‚Äé      display: grid;
‚Äé      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
‚Äé      gap: 15px;
‚Äé      padding: 20px;
‚Äé    }
‚Äé
‚Äé    .movie {
‚Äé      background: #1c1c1c;
‚Äé      border-radius: 10px;
‚Äé      overflow: hidden;
‚Äé      transition: 0.3s;
‚Äé    }
‚Äé
‚Äé    .movie:hover {
‚Äé      transform: scale(1.05);
‚Äé    }
‚Äé
‚Äé    img {
‚Äé      width: 100%;
‚Äé    }
‚Äé
‚Äé    .info {
‚Äé      padding: 10px;
‚Äé    }
‚Äé  </style>
‚Äé</head>
‚Äé<body>
‚Äé
‚Äé<h1>üî• MovieHub</h1>
‚Äé
‚Äé<div class="movies" id="movies"></div>
‚Äé
‚Äé<script>
‚Äéconst API_KEY = 37e39b166ef8c28d27abbe1e66cce807;
‚Äé
‚Äéconst URL = "https://api.themoviedb.org/3/trending/movie/week?api_key=" + API_KEY;
‚Äé
‚Äéasync function getMovies() {
‚Äé  try {
‚Äé    const res = await fetch(URL);
‚Äé    const data = await res.json();
‚Äé
‚Äé    const moviesContainer = document.getElementById("movies");
‚Äé
‚Äé    data.results.forEach(movie => {
‚Äé      const div = document.createElement("div");
‚Äé      div.classList.add("movie");
‚Äé
‚Äé      div.innerHTML = `
‚Äé        <img src="https://image.tmdb.org/t/p/w500${movie.poster_path}">
‚Äé        <div class="info">
‚Äé          <h3>${movie.title}</h3>
‚Äé          <p>‚≠ê ${movie.vote_average}</p>
‚Äé        </div>
‚Äé      `;
‚Äé
‚Äé      moviesContainer.appendChild(div);
‚Äé    });
‚Äé
‚Äé  } catch (error) {
‚Äé    document.body.innerHTML += "<p>Error loading movies</p>";
‚Äé    console.error(error);
‚Äé  }
‚Äé}
‚Äé
‚ÄégetMovies();
‚Äé</script>
‚Äé
‚Äé</body>
‚Äé</html>
