<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub Pro</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }

.scroll { display:flex; overflow-x:auto; gap:20px; }
.scroll::-webkit-scrollbar { display:none; }

.movie-card { min-width:180px; transition:0.3s; cursor:pointer; }
.movie-card:hover { transform:scale(1.1); }

.hero {
  height:65vh;
  display:flex;
  align-items:flex-end;
  padding:40px;
  background-size:cover;
  transition:1s;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-black/90 p-4 flex justify-between">
<h1 class="text-3xl font-bold">🎬 MovieHub</h1>
</nav>

<div id="mainPage" class="pt-20">

<!-- HERO -->
<div id="hero" class="hero">
  <div>
    <h1 id="heroTitle" class="text-5xl font-bold mb-4"></h1>
    <button onclick="playHeroTrailer()" class="bg-white text-black px-6 py-3 rounded">
      ▶ Trailer
    </button>
  </div>
</div>

<div id="rows" class="p-6"></div>

</div>

<!-- DETAILS -->
<div id="detailsPage" class="hidden fixed inset-0 bg-black p-6 z-50 overflow-auto">
<button onclick="closeDetailsPage()" class="text-2xl">←</button>

<img id="detailsPoster" class="w-64 my-6 rounded">
<h1 id="detailsTitle" class="text-3xl font-bold"></h1>
<p id="detailsOverview" class="text-gray-400 my-4"></p>

<div class="flex flex-wrap gap-4 mt-6">

<button onclick="playTrailerFromDetails()" class="bg-red-600 px-6 py-3 rounded">
▶ Watch Trailer
</button>

<button onclick="openPlatform('netflix')" class="bg-white text-black px-6 py-3 rounded">
Netflix
</button>

<button onclick="openPlatform('prime')" class="bg-yellow-500 px-6 py-3 rounded">
Prime Video
</button>

<button onclick="openPlatform('disney')" class="bg-blue-500 px-6 py-3 rounded">
Disney+
</button>

<button onclick="openPlatform('google')" class="bg-gray-700 px-6 py-3 rounded">
Search Online
</button>

</div>
</div>

<!-- TRAILER -->
<div id="trailerModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center">
<div class="w-full max-w-3xl">
<button onclick="closeTrailer()" class="text-2xl mb-2">✕</button>
<iframe id="trailerFrame" class="w-full aspect-video"></iframe>
</div>
</div>

<script>
const API_KEY="2b670b583329b90bcbad43227626c5f9";
let currentMovie=null;

const rowsData=[
{title:"Trending",url:`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`},
{title:"Popular",url:`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`}
];

async function fetchMovies(url){
 const res=await fetch(url);
 const data=await res.json();
 return data.results;
}

function createCard(movie){
 return `<div class="movie-card">
 <img src="https://image.tmdb.org/t/p/w300${movie.poster_path}">
 </div>`;
}

function setHero(movie){
 currentMovie=movie;
 hero.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
 heroTitle.textContent=movie.title||movie.name;
}

function startHeroRotation(movies){
 setHero(movies[0]);
 setInterval(()=>{
   const m=movies[Math.floor(Math.random()*movies.length)];
   setHero(m);
 },10000);
}

async function loadRows(){
 for(let row of rowsData){
  const movies=(await fetchMovies(row.url)).filter(m=>m.poster_path);

  const div=document.createElement("div");
  div.innerHTML=`<h2 class="text-xl mb-2">${row.title}</h2>
  <div class="scroll">${movies.map(createCard).join("")}</div>`;
  rows.appendChild(div);

  div.querySelectorAll(".movie-card").forEach((c,i)=>{
    c.onclick=()=>showDetails(movies[i]);
  });

  if(row.title==="Trending") startHeroRotation(movies);
 }
}

function showDetails(movie){
 currentMovie=movie;
 mainPage.style.display="none";
 detailsPage.style.display="block";

 detailsPoster.src=`https://image.tmdb.org/t/p/w500${movie.poster_path}`;
 detailsTitle.textContent=movie.title||movie.name;
 detailsOverview.textContent=movie.overview;
}

function closeDetailsPage(){
 detailsPage.style.display="none";
 mainPage.style.display="block";
}

async function playTrailerFromDetails(){
 const type=currentMovie.title?"movie":"tv";
 const res=await fetch(`https://api.themoviedb.org/3/${type}/${currentMovie.id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 const vid=data.results[0];
 if(!vid) return alert("No trailer");

 trailerFrame.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1`;
 trailerModal.style.display="flex";
}

function closeTrailer(){
 trailerModal.style.display="none";
 trailerFrame.src="";
}

function playHeroTrailer(){ playTrailerFromDetails(); }

function openPlatform(platform){
 const title=encodeURIComponent(currentMovie.title||currentMovie.name);

 if(platform==="netflix")
   window.open(`https://www.netflix.com/search?q=${title}`);
 else if(platform==="prime")
   window.open(`https://www.primevideo.com/search/ref=atv_nb_sr?phrase=${title}`);
 else if(platform==="disney")
   window.open(`https://www.disneyplus.com/search?q=${title}`);
 else
   window.open(`https://www.google.com/search?q=${title}+watch+online`);
}

window.onload=loadRows;
</script>

</body>
</html>
