<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }
.scroll { display:flex; overflow-x:auto; gap:16px; }
.scroll::-webkit-scrollbar { display:none; }

.movie-card { min-width:150px; cursor:pointer; }
.movie-card:hover { transform:scale(1.05); }

.hero {
 height:65vh;
 display:flex;
 align-items:flex-end;
 padding:30px;
 background-size:cover;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-black p-4 flex justify-between z-50">
<h1 class="text-2xl font-bold">🎬 MovieHub</h1>
<div>
<button onclick="openSearch()">🔍</button>
<button onclick="openWatchlist()">❤️</button>
</div>
</nav>

<div id="main" class="pt-16">

<!-- HERO -->
<div id="hero" class="hero">
<div>
<h1 id="heroTitle" class="text-3xl font-bold mb-3"></h1>
<button onclick="playHeroTrailer()" class="bg-white text-black px-4 py-2 rounded">
▶ Trailer
</button>
</div>
</div>

<!-- ADS -->
<div class="p-4 text-center">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1234567890"
data-ad-format="auto"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="rows" class="px-4"></div>

<!-- FOOTER -->
<footer class="p-6 mt-10 border-t border-gray-700 text-gray-400">
<p>Email: eh710214@gmail.com</p>
<p>Phone: +2349049696168</p>
<p>We don’t host movies. All rights belong to owners.</p>
</footer>

</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black p-4 z-50">
<button onclick="closeSearch()">←</button>
<input id="searchInput" class="w-full p-3 bg-zinc-800 mt-4 rounded" placeholder="Search...">
<div id="searchResults" class="grid grid-cols-3 gap-3 mt-4"></div>
</div>

<!-- WATCHLIST -->
<div id="watchlistPage" class="hidden fixed inset-0 bg-black p-4 z-50">
<button onclick="closeWatchlist()">←</button>
<div id="watchlistGrid" class="grid grid-cols-3 gap-3"></div>
</div>

<!-- TRAILER -->
<div id="trailerModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center">
<div class="w-full max-w-xl">
<button onclick="closeTrailer()">✕</button>
<iframe id="trailerFrame" class="w-full aspect-video"></iframe>
</div>
</div>

<script>
const API_KEY = "2b670b583329b90bcbad43227626c5f9";

let currentMovie = null;
let watchlist = JSON.parse(localStorage.getItem("watchlist")||"[]");

function fetchMovies(url){
 return fetch(url)
 .then(r=>r.json())
 .then(d=>d.results||[])
 .catch(()=>[]);
}

function card(m){
 return `
 <div class="movie-card">
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" class="w-full h-36 object-cover rounded">
 </div>`;
}

function setHero(m){
 if(!m || !m.backdrop_path) return;
 hero.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
 heroTitle.innerText=m.title||m.name;
 currentMovie=m;
}

async function load(){

 const categories = [
 ["Trending",`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`],
 ["Top Rated",`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`],
 ["Movies",`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`],
 ["TV Shows",`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`],
 ["Action",`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`],
 ["Horror",`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27`],
 ["Anime",`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_keywords=210024`],
 ["K-Drama",`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_origin_country=KR`],
 ["Bollywood",`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=IN`],
 ["Chinese",`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=CN`]
 ];

 rows.innerHTML="";

 for(const [title,url] of categories){

  const movies=(await fetchMovies(url)).filter(m=>m.poster_path);
  if(!movies.length) continue;

  if(title==="Trending") setHero(movies[0]);

  const section=document.createElement("div");
  section.innerHTML=`
  <h2 class="text-xl my-4 font-bold">${title}</h2>
  <div class="scroll">${movies.map(card).join("")}</div>`;

  rows.appendChild(section);

  section.querySelectorAll(".movie-card").forEach((c,i)=>{
   c.onclick=()=>showDetails(movies[i]);
  });
 }
}

function showDetails(m){
 currentMovie=m;
 playTrailer();
}

async function playTrailer(){
 const type=currentMovie.title?"movie":"tv";
 const res=await fetch(`https://api.themoviedb.org/3/${type}/${currentMovie.id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 const vid=data.results[0];
 if(!vid) return;

 trailerFrame.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1`;
 trailerModal.classList.remove("hidden");
}

function playHeroTrailer(){ playTrailer(); }

function closeTrailer(){
 trailerModal.classList.add("hidden");
 trailerFrame.src="";
}

function openSearch(){ searchPage.classList.remove("hidden"); }
function closeSearch(){ searchPage.classList.add("hidden"); }

searchInput.oninput=async e=>{
 const q=e.target.value;
 if(q.length<2) return;

 const res=await fetchMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 searchResults.innerHTML=res.filter(m=>m.poster_path).map(card).join("");

 searchResults.querySelectorAll(".movie-card").forEach((c,i)=>{
  c.onclick=()=>showDetails(res[i]);
 });
};

function openWatchlist(){
 watchlistPage.classList.remove("hidden");
 watchlistGrid.innerHTML=watchlist.map(card).join("");
}
function closeWatchlist(){ watchlistPage.classList.add("hidden"); }

window.onload=load;
</script>

</body>
</html>
