<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub V7 ULTIMATE</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE (UNCHANGED) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.05); }
.hero iframe { width:100%; height:230px; }
.gridMovies { display:grid; grid-template-columns:repeat(2,1fr); gap:15px; }
.platformGrid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/80 flex justify-between p-3 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search..." class="bg-gray-900 px-3 py-1 rounded w-1/2">
</nav>

<!-- HERO -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo" allow="autoplay"></iframe>
</div>

<div class="p-4">
<h1 id="heroTitle" class="text-xl font-bold"></h1>
<p id="heroDesc" class="text-gray-400 text-sm"></p>
<button onclick="openMovie(heroMovie)" class="bg-white text-black px-4 py-2 mt-3 rounded">▶ Watch</button>
</div>

<!-- CLICKABLE MENU -->
<div class="px-4 space-y-3 text-lg">
<div onclick="openSection('top5')" class="cursor-pointer">🏆 Top 5 Movies</div>
<div onclick="openSection('platforms')" class="cursor-pointer">📺 Streaming Platforms</div>
<div onclick="openSection('netflix')" class="cursor-pointer">🔥 On Netflix</div>
<div onclick="openSection('upcoming')" class="cursor-pointer">⏳ Coming Soon</div>
</div>

<!-- TOP 10 -->
<div class="px-4 mt-6">
<h2>🔥 Top 10</h2>
<div id="top10" class="scroll mt-3"></div>
</div>

<!-- CATEGORIES -->
<div id="rows" class="px-4 mt-6"></div>

</div>

<!-- SECTION PAGE -->
<div id="sectionPage" class="hidden p-4">
<button onclick="goHome()">← Back</button>
<h1 id="sectionTitle" class="text-xl my-3"></h1>
<div id="sectionContent" class="gridMovies"></div>
</div>

<!-- MOVIE PAGE -->
<div id="moviePage" class="hidden p-4">
<button onclick="goHome()">← Back</button>
<div id="movieDetails"></div>
</div>

<!-- FOOTER -->
<footer class="text-center text-gray-500 mt-10 text-xs pb-6">
© 2026 MovieHub
</footer>

<script>

const API_KEY="fc53416dd4f13229c0a99225cf54033c";
let heroMovie;

/* STOP VIDEO */
function stopAllVideos(){
document.querySelectorAll("iframe").forEach(v=>v.src=v.src);
}

/* NAV */
function goHome(){
stopAllVideos();
homePage.style.display="block";
sectionPage.classList.add("hidden");
moviePage.classList.add("hidden");
}

/* CARD */
function cardGrid(m){
return `
<div class="bg-gray-900 p-2 rounded card" onclick='openMovie(${JSON.stringify(m)})'>
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}" class="rounded mb-2">
<h3 class="text-sm font-bold">${m.title}</h3>
<p class="text-xs text-gray-400">${m.overview?.slice(0,60)||""}...</p>
</div>`;
}

/* OPEN MOVIE */
async function openMovie(m){
homePage.style.display="none";
sectionPage.classList.add("hidden");
moviePage.classList.remove("hidden");

const vid=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const trailer=vid.results.find(v=>v.type==="Trailer");

const prov=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/watch/providers?api_key=${API_KEY}`).then(r=>r.json());
const providers=prov.results?.NG?.flatrate || [];

movieDetails.innerHTML=`
<img src="https://image.tmdb.org/t/p/w400${m.poster_path}" class="mb-3 rounded">

<h1 class="text-xl font-bold">${m.title}</h1>
<p class="text-yellow-400">⭐ ${m.vote_average}</p>
<p class="my-3 text-sm">${m.overview}</p>

<h3 class="mt-3">📺 Watch On:</h3>
<div class="flex flex-wrap gap-2 mt-2">
${
providers.length
? providers.map(p=>`
<a href="https://www.google.com/search?q=${p.provider_name}+watch" target="_blank"
class="bg-gray-800 px-3 py-2 rounded flex gap-2 items-center">
<img src="https://image.tmdb.org/t/p/w45${p.logo_path}" class="w-5">
${p.provider_name}
</a>`).join("")
: `<p class="text-gray-400">Not Available</p>`
}
</div>

<button onclick="playTrailer('${trailer?.key}')" class="bg-white text-black px-4 py-2 mt-4 rounded">▶ Trailer</button>

<div id="trailerBox" class="mt-4"></div>
`;
}

/* TRAILER */
function playTrailer(k){
if(!k)return alert("No trailer");
trailerBox.innerHTML=`<iframe width="100%" height="250"
src="https://www.youtube.com/embed/${k}?autoplay=1"></iframe>`;
}

/* SECTION HANDLER */
async function openSection(type){
homePage.style.display="none";
sectionPage.classList.remove("hidden");

let url="";
let title="";

if(type==="top5"){
title="Top 5 Movies";
url=`/trending/movie/day`;
}

if(type==="netflix"){
title="On Netflix";
url=`/discover/movie?with_watch_providers=8&watch_region=US`;
}

if(type==="upcoming"){
title="Coming Soon";
url=`/movie/upcoming`;
}

if(type==="platforms"){
sectionTitle.innerText="Streaming Platforms";
sectionContent.innerHTML=`
<div class="platformGrid">
<a href="https://www.netflix.com" target="_blank" class="bg-red-600 p-4 text-center rounded">Netflix</a>
<a href="https://www.primevideo.com" target="_blank" class="bg-blue-600 p-4 text-center rounded">Prime</a>
<a href="https://www.disneyplus.com" target="_blank" class="bg-indigo-600 p-4 text-center rounded">Disney+</a>
<a href="https://tv.apple.com" target="_blank" class="bg-gray-700 p-4 text-center rounded">Apple TV</a>
<a href="https://www.hulu.com" target="_blank" class="bg-green-600 p-4 text-center rounded">Hulu</a>
<a href="https://www.hbomax.com" target="_blank" class="bg-purple-600 p-4 text-center rounded">HBO Max</a>
</div>`;
return;
}

sectionTitle.innerText=title;

const res=await fetch(`https://api.themoviedb.org/3${url}&api_key=${API_KEY}`);
const data=await res.json();

sectionContent.innerHTML=data.results.slice(0,12).map(cardGrid).join("");
}

/* LOAD HOME */
async function load(){

const t=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

/* RANDOM HERO */
heroMovie=t.results[Math.floor(Math.random()*t.results.length)];
heroTitle.innerText=heroMovie.title;
heroDesc.innerText=heroMovie.overview;

const v=await fetch(`https://api.themoviedb.org/3/movie/${heroMovie.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const tr=v.results.find(x=>x.type==="Trailer");

if(tr){
heroVideo.src=`https://www.youtube.com/embed/${tr.key}?autoplay=1&mute=1`;
}

/* TOP 10 */
top10.innerHTML=t.results.map(m=>`
<div onclick='openMovie(${JSON.stringify(m)})'>
<img src="https://image.tmdb.org/t/p/w200${m.poster_path}" class="rounded">
</div>`).join("");

/* CATEGORIES */
const genres=[["Action",28],["Comedy",35],["Horror",27],["Drama",18]];
rows.innerHTML="";
for(const [n,id] of genres){
const r=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
const d=await r.json();

rows.innerHTML+=`
<h2 class="mt-6">${n}</h2>
<div class="scroll mt-2">
${d.results.map(m=>`
<div onclick='openMovie(${JSON.stringify(m)})'>
<img src="https://image.tmdb.org/t/p/w200${m.poster_path}" class="rounded">
</div>`).join("")}
</div>`;
}

}

window.onload=load;

</script>

</body>
</html>
