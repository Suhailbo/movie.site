<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MovieHub</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      text-align: center;
    }
    .movies {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      padding: 20px;
    }
    .movie {
      background: #1c1c1c;
      padding: 10px;
      border-radius: 10px;
    }
    img {
      width: 100%;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h1>üî• MovieHub</h1>

<div class="movies" id="movies"></div>

‚Äé<script>
‚Äéconst API_KEY = "37e39b166ef8c28d27abbe1e66cce807";
‚Äéconst URL = `https://api.themoviedb.org/3/trending/movie/week?api_key=${37e39b166ef8c28d27abbe1e66cce807}`;
‚Äé
‚Äéfetch(URL)
‚Äé  .then(res => res.json())
‚Äé  .then(data => {
‚Äé    console.log(data); // üëà helps debug
‚Äé
‚Äé    const movies = document.getElementById("movies");
‚Äé
‚Äé    data.results.forEach(movie => {
‚Äé      const div = document.createElement("div");
‚Äé      div.classList.add("movie");
‚Äé
‚Äé      div.innerHTML = `

‚Äé        <h3>${movie.title}</h3>
‚Äé        <p>‚≠ê ${movie.vote_average}</p>
‚Äé      `;
‚Äé
‚Äé      movies.appendChild(div);
‚Äé    });
‚Äé  })
‚Äé  .catch(err => console.error("ERROR:", err));
‚Äé</script>

</body>
</html>
