<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ✅ GOOGLE ADSENSE (UNCHANGED) -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }
.hero { height:80vh; position:relative; }
.hero iframe { position:absolute; width:100%; height:100%; }
.overlay { position:absolute; inset:0; background:linear-gradient(to top, black, transparent); }
.searchPage { position:fixed; inset:0; background:black; z-index:200; display:none; overflow-y:auto; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 backdrop-blur bg-black/70 flex justify-between p-4 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>

<input id="searchInput"
placeholder="Search movies..."
class="bg-gray-900 border border-gray-600 px-4 py-2 rounded w-1/2 text-white">
</nav>

<!-- SEARCH -->
<div id="searchPage" class="searchPage pt-20 px-4">
<button onclick="closeSearch()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Back</button>

<input id="searchInput2"
placeholder="Search movies..."
class="w-full bg-gray-900 border border-gray-600 px-4 py-3 rounded text-white mb-4">

<div id="searchResults"></div>
</div>

<!-- MOVIE -->
<div id="moviePage" class="searchPage pt-20 px-4">
<button onclick="closeMoviePage()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Back</button>

<div id="movieDetails"></div>

<h2 class="mt-6 text-xl">🤖 Recommended</h2>
<div id="recommendations" class="scroll mt-3"></div>
</div>

<!-- EXTRA PAGE -->
<div id="extraPage" class="searchPage pt-20 px-6">
<button onclick="goHome()" class="mb-4 bg-gray-700 px-4 py-2 rounded">← Back</button>
<div id="extraContent" class="max-w-3xl mx-auto text-gray-300 leading-7"></div>
</div>

<!-- HOME -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo" allow="autoplay"></iframe>
<div class="overlay"></div>

<div class="absolute bottom-10 left-6">
<h1 id="heroTitle" class="text-4xl font-bold"></h1>
<p id="heroDesc" class="max-w-lg text-gray-300"></p>
<button onclick="openMovie(heroMovie)" class="mt-3 bg-white text-black px-4 py-2">▶ Watch Trailer</button>
</div>
</div>

<div class="px-4">
<h2 class="text-xl mt-4 mb-2">🔥 Top 10</h2>
<div id="top10" class="scroll mb-4"></div>
<div id="rows"></div>
</div>

</div>

<!-- FOOTER -->
<footer class="bg-black border-t border-gray-800 mt-10 px-6 py-10">
<div class="grid md:grid-cols-3 gap-8">

<div>
<h2 class="text-white font-bold text-lg mb-3">🎬 MovieHub</h2>
<p class="text-gray-400">Discover movies, trailers & streaming platforms.</p>
</div>

<div>
<h3 class="text-white mb-3">Links</h3>
<ul class="space-y-2 text-gray-400">
<li onclick="goHome()">Home</li>
<li onclick="openPage('policy')">Privacy Policy</li>
<li onclick="openPage('terms')">Terms of Service</li>
<li onclick="openPage('contact')">Support</li>
<li onclick="openPage('disclaimer')">Disclaimer</li>
</ul>
</div>

<div>
<h3 class="text-white mb-3">Feedback</h3>
<form action="https://formsubmit.co/eh710214@gmail.com" method="POST">
<input type="text" name="name" placeholder="Name" class="w-full mb-2 bg-gray-800 p-2 rounded">
<input type="email" name="email" placeholder="Email" class="w-full mb-2 bg-gray-800 p-2 rounded">
<textarea name="message" placeholder="Feedback" class="w-full mb-2 bg-gray-800 p-2 rounded"></textarea>
<button class="bg-white text-black px-4 py-2 w-full rounded">Send</button>
<input type="hidden" name="_captcha" value="false">
</form>
</div>

</div>

<div class="text-center text-gray-500 mt-6 text-sm">
© 2026 MovieHub
</div>
</footer>

<script>

const API_KEY="2b670b583329b90bcbad43227626c5f9"; // ✅ YOUR KEY INSERTED

let heroMovie;

// NAV
function goHome(){
homePage.style.display="block";
moviePage.style.display="none";
searchPage.style.display="none";
extraPage.style.display="none";
}

// SEARCH
searchInput.onclick=()=>{
searchPage.style.display="block";
setTimeout(()=>searchInput2.focus(),100);
};

searchInput.oninput=()=>{
searchInput2.value=searchInput.value;
runSearch(searchInput.value);
};

searchInput2.oninput=()=>{
searchInput.value=searchInput2.value;
runSearch(searchInput2.value);
};

async function runSearch(q){
if(q.length<2){ searchResults.innerHTML=""; return; }

const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
const data=await res.json();

searchResults.innerHTML=data.results.map(m=>`
<div class="flex gap-4 bg-gray-900 p-3 rounded cursor-pointer">
<img src="${m.poster_path ? `https://image.tmdb.org/t/p/w200${m.poster_path}` : 'https://via.placeholder.com/200'}" class="w-24">
<div>
<h3>${m.title}</h3>
<p class="text-sm text-gray-400">${m.overview||""}</p>
</div>
</div>`).join("");

document.querySelectorAll("#searchResults > div").forEach((el,i)=>{
el.onclick=()=>openMovie(data.results[i]);
});
}

// TRAILER
async function getTrailer(id){
const r=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
const d=await r.json();
return d.results.find(v=>v.type==="Trailer")?.key;
}

// RECOMMENDATIONS
async function getRecommendations(id){
const r=await fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`);
const d=await r.json();
return d.results.slice(0,10);
}

// MOVIE PAGE
async function openMovie(m){

moviePage.style.display="block";
homePage.style.display="none";

const trailer=await getTrailer(m.id);
const recs=await getRecommendations(m.id);

movieDetails.innerHTML=`
<img src="${m.poster_path ? `https://image.tmdb.org/t/p/w400${m.poster_path}` : ''}" class="rounded w-full md:w-1/3 mb-4">

<h1 class="text-3xl font-bold">${m.title}</h1>
<p class="text-yellow-400">⭐ ${m.vote_average}</p>
<p class="text-gray-300 my-3">${m.overview||""}</p>

<button onclick="playTrailer('${trailer}')" class="bg-white text-black px-4 py-2 rounded">
▶ Watch Trailer
</button>

<div id="trailerBox" class="mt-4"></div>
`;

recommendations.innerHTML=recs.map(r=>`
<div class="card" onclick='openMovie(${JSON.stringify(r)})'>
<img src="${r.poster_path ? `https://image.tmdb.org/t/p/w300${r.poster_path}` : ''}">
</div>`).join("");
}

function playTrailer(k){
if(!k) return alert("No trailer");
trailerBox.innerHTML=`<iframe width="100%" height="300"
src="https://www.youtube.com/embed/${k}?autoplay=1"></iframe>`;
}

// LEGAL PAGES
function openPage(type){
extraPage.style.display="block";
homePage.style.display="none";

if(type==="policy"){
extraContent.innerHTML=`<h1 class="text-3xl mb-4">Privacy Policy</h1><p>We respect your privacy.</p>`;
}

if(type==="terms"){
extraContent.innerHTML=`<h1 class="text-3xl mb-4">Terms of Service</h1><p>Use MovieHub legally.</p>`;
}

if(type==="contact"){
extraContent.innerHTML=`<h1 class="text-3xl mb-4">Support</h1><p>Email: eh710214@gmail.com</p>`;
}

if(type==="disclaimer"){
extraContent.innerHTML=`<h1 class="text-3xl mb-4">Disclaimer</h1><p>We do not host movies.</p>`;
}
}

// LOAD
async function load(){
const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

heroMovie=trending.results[Math.floor(Math.random()*trending.results.length)];

heroTitle.innerText=heroMovie.title;
heroDesc.innerText=heroMovie.overview;

const t=await getTrailer(heroMovie.id);
if(t) heroVideo.src=`https://www.youtube.com/embed/${t}?autoplay=1&mute=1`;

top10.innerHTML=trending.results.slice(0,10).map(m=>`
<div class="card" onclick='openMovie(${JSON.stringify(m)})'>
<img src="${m.poster_path ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : ''}">
</div>`).join("");
}

window.onload=load;

</script>

</body>
</html>
