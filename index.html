<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub V6 ULTRA</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { min-width:140px; cursor:pointer; }
.hero iframe { width:100%; height:230px; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/80 backdrop-blur flex justify-between p-3">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search..." class="bg-gray-900 px-3 py-1 rounded text-sm w-1/2">
</nav>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black z-50 p-4">
<button onclick="closeSearch()">← Back</button>
<input id="searchInput2" class="w-full bg-gray-900 p-3 my-3 rounded">
<div id="searchResults"></div>
</div>

<!-- MOVIE -->
<div id="moviePage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeMoviePage()">← Back</button>
<div id="movieDetails"></div>
<h2 class="mt-6">Recommended</h2>
<div id="recommendations" class="scroll"></div>
</div>

<!-- HOME -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo"></iframe>
</div>

<div class="p-4">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
<button onclick="openMovie(heroMovie)" class="bg-white text-black px-4 py-2 mt-2">Watch</button>
</div>

<!-- ADS -->
<div class="p-4">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<!-- NAV LINKS -->
<div class="p-4 space-y-3">
<p onclick="scrollToSection('top5')" class="cursor-pointer">🏆 Top 5 Movies</p>
<p onclick="scrollToSection('providers')" class="cursor-pointer">📺 Streaming Platforms</p>
<p onclick="scrollToSection('netflixRow')" class="cursor-pointer">🔥 On Netflix</p>
<p onclick="scrollToSection('upcoming')" class="cursor-pointer">⏳ Coming Soon</p>
</div>

<!-- TOP 10 -->
<div class="p-4">
<h2>Top 10</h2>
<div id="top10" class="scroll"></div>
</div>

<!-- TOP 5 -->
<div id="top5" class="p-4"></div>

<!-- PROVIDERS -->
<div id="providers" class="p-4"></div>

<!-- NETFLIX -->
<div id="netflixRow" class="p-4"></div>

<!-- UPCOMING -->
<div id="upcoming" class="p-4"></div>

<!-- GENRES -->
<div id="rows" class="p-4"></div>

</div>

<script>
const API_KEY="fc53416dd4f13229c0a99225cf54033c";
let heroMovie;

function stopAllVideos(){
document.querySelectorAll("iframe").forEach(v=>v.src="");
}

function goHome(){
stopAllVideos();
moviePage.classList.add("hidden");
homePage.style.display="block";
}

function closeMoviePage(){
stopAllVideos();
moviePage.classList.add("hidden");
homePage.style.display="block";
}

function closeSearch(){
searchPage.classList.add("hidden");
}

searchInput.onclick=()=>searchPage.classList.remove("hidden");

searchInput.oninput=e=>{
searchInput2.value=e.target.value;
runSearch(e.target.value);
};

searchInput2.oninput=e=>{
searchInput.value=e.target.value;
runSearch(e.target.value);
};

async function runSearch(q){
if(q.length<2)return searchResults.innerHTML="";
const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
const data=await res.json();
searchResults.innerHTML=data.results.map(m=>`
<div onclick="openMovieById(${m.id})" class="bg-gray-900 p-3 mb-2 cursor-pointer">
${m.title}
</div>`).join("");
}

async function openMovieById(id){
const r=await fetch(`https://api.themoviedb.org/3/movie/${id}?api_key=${API_KEY}`);
const m=await r.json();
openMovie(m);
}

function card(m){
return `<div onclick="openMovieById(${m.id})">
<img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
</div>`;
}

async function openMovie(m){
homePage.style.display="none";
moviePage.classList.remove("hidden");

const vid=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const trailer=vid.results.find(v=>v.type==="Trailer");

const prov=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/watch/providers?api_key=${API_KEY}`).then(r=>r.json());

const providers=prov.results?.NG?.flatrate||[];
const link=prov.results?.NG?.link||"#";

movieDetails.innerHTML=`
<h1>${m.title}</h1>
<p>${m.overview}</p>

<h3>Watch On</h3>
${providers.length?providers.map(p=>`
<a href="${link}" target="_blank">${p.provider_name}</a>
`).join(""):"Not available"}

<button onclick="playTrailer('${trailer?.key}')">Trailer</button>
<div id="trailerBox"></div>
`;

loadRec(m.id);
}

function playTrailer(k){
if(!k)return;
trailerBox.innerHTML=`<iframe src="https://youtube.com/embed/${k}?autoplay=1"></iframe>`;
}

async function loadRec(id){
const r=await fetch(`https://api.themoviedb.org/3/movie/${id}/recommendations?api_key=${API_KEY}`);
const d=await r.json();
recommendations.innerHTML=d.results.map(card).join("");
}

async function load(){

const t=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

heroMovie=t.results[Math.floor(Math.random()*t.results.length)];
heroTitle.innerText=heroMovie.title;
heroDesc.innerText=heroMovie.overview;

const v=await fetch(`https://api.themoviedb.org/3/movie/${heroMovie.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
const tr=v.results.find(x=>x.type==="Trailer");
if(tr)heroVideo.src=`https://youtube.com/embed/${tr.key}?autoplay=1&mute=1`;

top10.innerHTML=t.results.slice(0,10).map(card).join("");

// TOP 5
top5.innerHTML=`<h2>Top 5</h2><div class="grid grid-cols-2 gap-3">
${t.results.slice(0,5).map(m=>card(m)).join("")}
</div>`;

// PROVIDERS
providers.innerHTML=`<h2>Platforms</h2><div class="grid grid-cols-3 gap-2">
<a href="https://www.netflix.com" target="_blank">Netflix</a>
<a href="https://www.primevideo.com" target="_blank">Prime</a>
<a href="https://www.disneyplus.com" target="_blank">Disney+</a>
<a href="https://www.showmax.com" target="_blank">Showmax</a>
</div>`;

// NETFLIX
const n=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_watch_providers=8&watch_region=NG`).then(r=>r.json());
netflixRow.innerHTML=`<h2>Netflix</h2><div class="grid grid-cols-2 gap-3">
${n.results.slice(0,6).map(card).join("")}
</div>`;

// UPCOMING
const u=await fetch(`https://api.themoviedb.org/3/movie/upcoming?api_key=${API_KEY}`).then(r=>r.json());
upcoming.innerHTML=`<h2>Coming Soon</h2><div class="grid grid-cols-2 gap-3">
${u.results.slice(0,6).map(card).join("")}
</div>`;
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

window.onload=load;
</script>

</body>
</html>
