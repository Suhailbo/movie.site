<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; font-family:sans-serif; }

.scroll { display:flex; overflow-x:auto; gap:14px; }
.scroll::-webkit-scrollbar { display:none; }

.card { min-width:150px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.1); }

.gridSearch {
 display:grid;
 grid-template-columns: repeat(3,1fr);
 gap:10px;
}

.modal {
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.9);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:100;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed w-full bg-black flex justify-between p-4 z-50">
<h1 class="font-bold cursor-pointer" onclick="goHome()">🎬 MovieHub</h1>

<input id="searchInput"
placeholder="Search movies..."
class="bg-gray-800 px-3 py-1 rounded w-1/2">
</nav>

<div class="pt-20 px-4">

<!-- SEARCH -->
<div id="searchPage" style="display:none;">
<button onclick="goHome()" class="mb-3 bg-gray-700 px-3 py-1">← Back</button>

<h2 class="text-xl mb-3">Search Results</h2>
<div id="searchResults" class="gridSearch"></div>
</div>

<!-- HOME -->
<div id="homePage">

<h2 class="text-xl mb-2">🔥 Top 10</h2>
<div id="top10" class="scroll mb-6"></div>

<h2 class="text-xl mb-2">▶ Continue Watching</h2>
<div id="continueRow" class="scroll mb-6"></div>

<!-- AD -->
<div class="text-center my-6">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="rows"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal flex items-center justify-center">
<div class="bg-black p-5 max-w-lg w-full">

<h2 id="mTitle" class="text-xl mb-2"></h2>

<!-- STREAMING BADGES -->
<div class="flex gap-3 my-3 text-xs">
<span class="bg-red-600 px-2 py-1 rounded">Netflix</span>
<span class="bg-blue-600 px-2 py-1 rounded">Prime</span>
<span class="bg-indigo-600 px-2 py-1 rounded">Disney+</span>
<span class="bg-purple-600 px-2 py-1 rounded">HBO</span>
</div>

<!-- TRAILER -->
<div id="trailerBox" class="mb-3"></div>

<p id="mDesc" class="text-gray-300"></p>

<div class="flex gap-3 mt-3">
<button onclick="playTrailer()" class="bg-white text-black px-3 py-1">▶ Watch Trailer</button>
<button onclick="saveContinue()" class="bg-gray-700 px-3 py-1">▶ Continue</button>
<button onclick="closeModal()" class="bg-red-600 px-3 py-1">Close</button>
</div>

</div>
</div>

<!-- FOOTER -->
<footer class="bg-black text-gray-400 mt-16 px-6 py-10 border-t border-gray-800">
<div class="text-center text-sm">
<p>© 2026 MovieHub</p>
<p>Email: eh710214@gmail.com | Phone: +2349049696168</p>
</div>
</footer>

<script>

const API_KEY="2b670b583329b90bcbad43227626c5f9";

let currentMovie=null;
let currentTrailer=null;
let contData=JSON.parse(localStorage.getItem("continue")||"[]");

function goHome(){
 searchPage.style.display="none";
 homePage.style.display="block";
}

// SEARCH
searchInput.oninput=async()=>{
 const q=searchInput.value;

 if(q.length<2){
  goHome();
  return;
 }

 const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 const data=await res.json();

 homePage.style.display="none";
 searchPage.style.display="block";

 searchResults.innerHTML=data.results.map(m=>`
 <div class="card">
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 <p class="text-sm">${m.title}</p>
 </div>`).join("");

 document.querySelectorAll("#searchResults .card").forEach((c,i)=>{
  c.onclick=()=>openModal(data.results[i]);
 });
};

// TRAILER FETCH
async function getTrailer(id){
 const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 const t=data.results.find(v=>v.type==="Trailer");
 return t ? t.key : null;
}

// MODAL
async function openModal(m){
 currentMovie=m;
 mTitle.innerText=m.title;
 mDesc.innerText=m.overview;

 currentTrailer = await getTrailer(m.id);
 trailerBox.innerHTML="";

 modal.style.display="flex";
}

function playTrailer(){
 if(!currentTrailer){
  alert("No trailer available");
  return;
 }

 trailerBox.innerHTML=`
 <iframe width="100%" height="200"
 src="https://www.youtube.com/embed/${currentTrailer}?autoplay=1"
 frameborder="0" allow="autoplay"></iframe>`;
}

function closeModal(){
 modal.style.display="none";
 trailerBox.innerHTML="";
}

// CONTINUE
function saveContinue(){
 contData.unshift(currentMovie);
 localStorage.setItem("continue",JSON.stringify(contData));
 renderContinue();
}

function renderContinue(){
 continueRow.innerHTML=contData.map(m=>`
 <div class="card">
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 </div>`).join("");
}

// CARD
function card(m){
 return `<div class="card">
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 </div>`;
}

// LOAD
async function load(){

 const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

 top10.innerHTML=trending.results.slice(0,10).map(card).join("");

 document.querySelectorAll("#top10 .card").forEach((c,i)=>{
  c.onclick=()=>openModal(trending.results[i]);
 });

 const genres=[
 ["Action",28],
 ["Comedy",35],
 ["Horror",27],
 ["Sci-Fi",878],
 ["Romance",10749],
 ["Drama",18]
 ];

 for(const [name,id] of genres){

  const res=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
  const data=await res.json();

  rows.innerHTML+=`
  <h2 class="mt-6">${name}</h2>
  <div class="scroll">${data.results.map(card).join("")}</div>`;

  const cards=rows.lastElementChild.querySelectorAll(".card");
  cards.forEach((c,i)=>c.onclick=()=>openModal(data.results[i]));
 }

}

window.onload=()=>{
 load();
 renderContinue();
};

</script>

</body>
</html>
