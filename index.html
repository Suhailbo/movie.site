<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }

.scroll {
  display:flex;
  overflow-x:auto;
  gap:20px;
  padding-bottom:10px;
}
.scroll::-webkit-scrollbar { display:none; }

.movie-card {
  min-width:180px;
  cursor:pointer;
  transition:0.3s;
}
.movie-card:hover { transform:scale(1.1); }

.hero {
  height:65vh;
  display:flex;
  align-items:flex-end;
  padding:40px;
  background-size:cover;
  transition:1s;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-black/90 p-4 flex justify-between z-50">
  <h1 class="text-3xl font-bold">🎬 MovieHub</h1>
  <div class="flex gap-6 text-lg">
    <span onclick="openSearchPage()" class="cursor-pointer">Search</span>
    <span onclick="openWatchlist()" class="cursor-pointer">❤️ Watchlist</span>
  </div>
</nav>

<div id="mainPage" class="pt-20">

<!-- HERO -->
<div id="hero" class="hero">
  <div>
    <h1 id="heroTitle" class="text-5xl font-bold mb-4"></h1>
    <button onclick="playHeroTrailer()" class="bg-white text-black px-6 py-3 rounded-xl text-lg">
      ▶ Watch Trailer
    </button>
  </div>
</div>

<!-- INTRO -->
<div class="p-6 text-gray-300 max-w-4xl text-lg">
  <h2 class="text-2xl mb-3 font-semibold">Discover Movies & Series</h2>
  <p>
  MovieHub helps you explore trending movies, anime, K-drama, and more.
  Watch trailers and discover new content easily.
  </p>
</div>

<!-- ROWS -->
<div id="rows" class="px-6"></div>

<!-- FOOTER -->
<footer class="mt-16 p-8 border-t border-gray-800 text-center text-gray-400">
  <div class="flex justify-center gap-8 mb-6 text-lg">
    <span onclick="openPage('about')" class="cursor-pointer">About</span>
    <span onclick="openPage('contact')" class="cursor-pointer">Contact</span>
    <span onclick="openPage('privacy')" class="cursor-pointer">Privacy Policy</span>
  </div>
  <p class="text-sm">Contact: eh710214@gmail.com</p>
  <p class="mt-2 text-sm">© 2026 MovieHub</p>
</footer>

</div>

<!-- DETAILS -->
<div id="detailsPage" class="hidden fixed inset-0 bg-black p-6 z-50 overflow-auto">
<button onclick="closeDetailsPage()" class="text-2xl">←</button>

<img id="detailsPoster" class="w-64 rounded my-6">
<h1 id="detailsTitle" class="text-3xl font-bold mb-2"></h1>
<p id="detailsOverview" class="text-gray-400 text-lg"></p>

<div class="flex flex-wrap gap-4 mt-6">
<button onclick="playTrailerFromDetails()" class="bg-red-600 px-6 py-3 rounded">▶ Trailer</button>

<button onclick="openPlatform('netflix')" class="bg-white text-black px-6 py-3 rounded">Netflix</button>
<button onclick="openPlatform('prime')" class="bg-yellow-500 px-6 py-3 rounded">Prime</button>
<button onclick="openPlatform('disney')" class="bg-blue-500 px-6 py-3 rounded">Disney+</button>
<button onclick="openPlatform('google')" class="bg-gray-700 px-6 py-3 rounded">Search</button>
</div>
</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black p-6 z-50">
<button onclick="closeSearchPage()" class="text-2xl mb-4">←</button>
<input id="searchInputFull" class="w-full p-3 mb-6 bg-zinc-800 rounded" placeholder="Search movies...">
<div id="searchResults" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</div>

<!-- WATCHLIST -->
<div id="watchlistPage" class="hidden fixed inset-0 bg-black p-6 z-50">
<button onclick="closeWatchlist()" class="text-2xl mb-4">←</button>
<h1 class="text-2xl mb-4">My Watchlist</h1>
<div id="watchlistGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</div>

<!-- INFO PAGE -->
<div id="infoPage" class="hidden fixed inset-0 bg-black p-8 z-50 overflow-auto">
<button onclick="closeInfoPage()" class="text-2xl mb-6">← Back</button>
<div id="infoContent" class="text-lg"></div>
</div>

<!-- TRAILER -->
<div id="trailerModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center">
<div class="w-full max-w-3xl">
<button onclick="closeTrailer()" class="text-2xl mb-2">✕</button>
<iframe id="trailerFrame" class="w-full aspect-video"></iframe>
</div>
</div>

<script>
const API_KEY="2b670b583329b90bcbad43227626c5f9";
let currentMovie=null;
let watchlist=JSON.parse(localStorage.getItem("watchlist")||"[]");

const rowsData=[
{title:"🔥 Trending",url:`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`},
{title:"⭐ Top Rated",url:`https://api.themoviedb.org/3/movie/top_rated?api_key=${API_KEY}`},
{title:"🎬 Movies",url:`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`},
{title:"📺 TV Shows",url:`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`},
{title:"💥 Action",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`},
{title:"👻 Horror",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27`},
{title:"🚀 Sci-Fi",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=878`},
{title:"🎌 Anime",url:`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_keywords=210024`},
{title:"🇰🇷 K-Drama",url:`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_origin_country=KR`},
{title:"🇮🇳 Bollywood",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=IN`}
];

async function fetchMovies(url){
  const res=await fetch(url);
  const data=await res.json();
  return data.results||[];
}

function createCard(movie){
  return `<div class="movie-card">
    <img src="https://image.tmdb.org/t/p/w300${movie.poster_path}" class="rounded-xl">
  </div>`;
}

let heroMovies=[];

function setHero(movie){
  currentMovie=movie;
  hero.style.backgroundImage=`linear-gradient(to bottom, rgba(0,0,0,0.6), black),
  url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
  heroTitle.textContent=movie.title||movie.name;
}

function startHeroRotation(movies){
  heroMovies=movies.filter(m=>m.backdrop_path);
  setHero(heroMovies[Math.floor(Math.random()*heroMovies.length)]);
  setInterval(()=>{
    setHero(heroMovies[Math.floor(Math.random()*heroMovies.length)]);
  },10000);
}

async function loadRows(){
  rows.innerHTML="";
  for(let row of rowsData){
    const movies=(await fetchMovies(row.url)).filter(m=>m.poster_path);

    const section=document.createElement("div");
    section.className="mb-10";

    section.innerHTML=`<h2 class="text-2xl mb-4">${row.title}</h2>
    <div class="scroll">${movies.map(createCard).join("")}</div>`;

    rows.appendChild(section);

    section.querySelectorAll(".movie-card").forEach((card,i)=>{
      card.onclick=()=>showDetails(movies[i]);
    });

    if(row.title.includes("Trending")){
      startHeroRotation(movies);
    }
  }
}

function showDetails(movie){
  currentMovie=movie;
  mainPage.classList.add("hidden");
  detailsPage.classList.remove("hidden");

  detailsPoster.src=`https://image.tmdb.org/t/p/w500${movie.poster_path}`;
  detailsTitle.textContent=movie.title||movie.name;
  detailsOverview.textContent=movie.overview;
}

function closeDetailsPage(){
  detailsPage.classList.add("hidden");
  mainPage.classList.remove("hidden");
}

function toggleWatchlist(movie){
  const exist=watchlist.find(m=>m.id===movie.id);
  if(exist) watchlist=watchlist.filter(m=>m.id!==movie.id);
  else watchlist.push(movie);
  localStorage.setItem("watchlist",JSON.stringify(watchlist));
}

function openSearchPage(){ mainPage.classList.add("hidden"); searchPage.classList.remove("hidden"); }
function closeSearchPage(){ searchPage.classList.add("hidden"); mainPage.classList.remove("hidden"); }

searchInputFull.addEventListener("input",async e=>{
  const q=e.target.value;
  if(q.length<3) return;

  const res=await fetchMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
  searchResults.innerHTML=res.filter(m=>m.poster_path).map(createCard).join("");
});

function openWatchlist(){
  mainPage.classList.add("hidden");
  watchlistPage.classList.remove("hidden");
  watchlistGrid.innerHTML=watchlist.map(createCard).join("");
}

function closeWatchlist(){
  watchlistPage.classList.add("hidden");
  mainPage.classList.remove("hidden");
}

function openPage(type){
  mainPage.classList.add("hidden");
  infoPage.classList.remove("hidden");

  if(type==="about"){
    infoContent.innerHTML=`<h1 class="text-3xl mb-6">About</h1>
    <p>MovieHub helps discover movies. We do not host content.</p>`;
  }
  if(type==="contact"){
    infoContent.innerHTML=`<h1 class="text-3xl mb-6">Contact</h1>
    <p>Email: eh710214@gmail.com</p>`;
  }
  if(type==="privacy"){
    infoContent.innerHTML=`<h1 class="text-3xl mb-6">Privacy Policy</h1>
    <p>We use cookies and third-party ads like AdSense.</p>`;
  }
}

function closeInfoPage(){
  infoPage.classList.add("hidden");
  mainPage.classList.remove("hidden");
}

function openPlatform(p){
  const t=encodeURIComponent(currentMovie.title||currentMovie.name);
  if(p==="netflix") window.open(`https://www.netflix.com/search?q=${t}`);
  else if(p==="prime") window.open(`https://www.primevideo.com/search/ref=atv_nb_sr?phrase=${t}`);
  else if(p==="disney") window.open(`https://www.disneyplus.com/search?q=${t}`);
  else window.open(`https://www.google.com/search?q=${t}+watch`);
}

async function playTrailerFromDetails(){
  const type=currentMovie.title?"movie":"tv";
  const res=await fetch(`https://api.themoviedb.org/3/${type}/${currentMovie.id}/videos?api_key=${API_KEY}`);
  const data=await res.json();
  const vid=data.results[0];
  if(!vid) return alert("No trailer");

  trailerFrame.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1`;
  trailerModal.classList.remove("hidden");
}

function playHeroTrailer(){ playTrailerFromDetails(); }
function closeTrailer(){ trailerModal.classList.add("hidden"); trailerFrame.src=""; }

window.onload=loadRows;
</script>

</body>
</html>
