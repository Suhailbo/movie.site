<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }

.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }

.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }

.hero { height:80vh; position:relative; }

.hero iframe {
 position:absolute;
 width:100%;
 height:100%;
}

.overlay {
 position:absolute;
 inset:0;
 background:linear-gradient(to top, black, transparent);
}

.modal {
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.9);
 display:none;
 justify-content:center;
 align-items:center;
 z-index:100;
}

.searchPage {
 position:fixed;
 inset:0;
 background:black;
 z-index:200;
 display:none;
 overflow-y:auto;
}

.gridSearch {
 display:grid;
 grid-template-columns: repeat(3,1fr);
 gap:12px;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed w-full bg-black flex justify-between p-4 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>

<input id="searchInput"
placeholder="Search movies..."
class="bg-gray-800 px-3 py-1 rounded w-1/2">
</nav>

<!-- SEARCH PAGE -->
<div id="searchPage" class="searchPage pt-20 px-4">

<button onclick="closeSearch()" class="mb-4 bg-gray-700 px-4 py-2 rounded">
← Back
</button>

<h2 class="text-2xl mb-4">Search Results</h2>
<div id="searchResults" class="gridSearch"></div>

</div>

<!-- HOME -->
<div id="homePage">

<!-- HERO -->
<div class="hero mt-16">
<iframe id="heroVideo" src="" frameborder="0" allow="autoplay"></iframe>
<div class="overlay"></div>

<div class="absolute bottom-10 left-6 z-10">
<h1 id="heroTitle" class="text-4xl font-bold"></h1>
<p id="heroDesc" class="max-w-lg text-gray-300"></p>
<button onclick="openModal(heroMovie)" class="mt-3 bg-white text-black px-4 py-2">
▶ Watch Trailer
</button>
</div>
</div>

<div class="px-4">

<h2 class="text-xl mt-4 mb-2">🔥 Top 10</h2>
<div id="top10" class="scroll mb-4"></div>

<!-- AD -->
<div class="text-center my-4">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div id="rows"></div>

</div>
</div>

<!-- MODAL -->
<div id="modal" class="modal flex items-center justify-center">
<div class="bg-black p-5 max-w-lg w-full">

<h2 id="mTitle" class="text-xl mb-2"></h2>

<div class="flex gap-2 my-2 text-xs">
<span class="bg-red-600 px-2 py-1 rounded">Netflix</span>
<span class="bg-blue-600 px-2 py-1 rounded">Prime</span>
<span class="bg-indigo-600 px-2 py-1 rounded">Disney+</span>
</div>

<div id="trailerBox" class="mb-3"></div>

<p id="mDesc" class="text-gray-300"></p>

<div class="flex gap-3 mt-3">
<button onclick="playTrailer()" class="bg-white text-black px-3 py-1">▶ Trailer</button>
<button onclick="closeModal()" class="bg-red-600 px-3 py-1">Close</button>
</div>

</div>
</div>

<!-- PREMIUM FOOTER + FEEDBACK -->
<footer class="bg-black text-gray-400 mt-10 px-6 py-10 border-t border-gray-800">

<div class="grid grid-cols-1 md:grid-cols-3 gap-8">

<!-- BRAND -->
<div>
<h2 class="text-white font-bold mb-3">🎬 MovieHub</h2>
<p>Discover movies, watch trailers and explore trending content worldwide.</p>
</div>

<!-- LINKS -->
<div>
<h3 class="text-white mb-3">Quick Links</h3>
<ul class="space-y-2">
<li onclick="goHome()" class="cursor-pointer hover:text-white">Home</li>
<li class="hover:text-white">Top 10</li>
<li class="hover:text-white">Categories</li>
</ul>
</div>

<!-- FEEDBACK -->
<div>
<h3 class="text-white mb-3">Send Feedback</h3>

<form action="https://formsubmit.co/eh710214@gmail.com" method="POST" class="space-y-2">

<input type="text" name="name" placeholder="Your Name"
class="w-full px-3 py-2 bg-gray-800 rounded text-white" required>

<input type="email" name="email" placeholder="Your Email"
class="w-full px-3 py-2 bg-gray-800 rounded text-white" required>

<textarea name="message" placeholder="Your feedback..."
class="w-full px-3 py-2 bg-gray-800 rounded text-white" required></textarea>

<button type="submit" class="bg-white text-black px-4 py-2 w-full">
Send Feedback
</button>

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_template" value="table">

</form>

</div>

</div>

<div class="border-t border-gray-800 mt-6 pt-4 text-center text-sm">
<p>© 2026 MovieHub</p>
<p>Email: eh710214@gmail.com | Phone: +2349049696168</p>
</div>

</footer>

<script>

const API_KEY="2b670b583329b90bcbad43227626c5f9";

let currentMovie=null;
let currentTrailer=null;
let heroMovie=null;

function goHome(){
 searchPage.style.display="none";
}

function closeSearch(){
 searchPage.style.display="none";
}

// SEARCH OPEN
searchInput.onfocus=()=>{
 searchPage.style.display="block";
}

// SEARCH
searchInput.oninput=async()=>{
 const q=searchInput.value;

 if(q.length<2){
  searchResults.innerHTML="";
  return;
 }

 const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 const data=await res.json();

 searchResults.innerHTML=data.results.map(m=>`
 <div class="card">
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 <p class="text-sm">${m.title}</p>
 </div>`).join("");

 document.querySelectorAll("#searchResults .card").forEach((c,i)=>{
  c.onclick=()=>openModal(data.results[i]);
 });
};

// TRAILER
async function getTrailer(id){
 const res=await fetch(`https://api.themoviedb.org/3/movie/${id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 const t=data.results.find(v=>v.type==="Trailer");
 return t ? t.key : null;
}

// HERO
async function setHero(movie){
 heroMovie=movie;
 heroTitle.innerText=movie.title;
 heroDesc.innerText=movie.overview;

 const t=await getTrailer(movie.id);
 if(t){
  heroVideo.src=`https://www.youtube.com/embed/${t}?autoplay=1&mute=1`;
 }
}

// MODAL
async function openModal(m){
 currentMovie=m;
 mTitle.innerText=m.title;
 mDesc.innerText=m.overview;

 currentTrailer=await getTrailer(m.id);
 trailerBox.innerHTML="";
 modal.style.display="flex";
}

function playTrailer(){
 if(!currentTrailer) return alert("No trailer");

 trailerBox.innerHTML=`
 <iframe width="100%" height="200"
 src="https://www.youtube.com/embed/${currentTrailer}?autoplay=1"></iframe>`;
}

function closeModal(){
 modal.style.display="none";
 trailerBox.innerHTML="";
}

// CARD
function card(m){
 return `<div class="card">
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 </div>`;
}

// LOAD
async function load(){

 const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

 setHero(trending.results[0]);

 top10.innerHTML=trending.results.slice(0,10).map(card).join("");

 document.querySelectorAll("#top10 .card").forEach((c,i)=>{
  c.onclick=()=>openModal(trending.results[i]);
 });

 const genres=[
 ["Action",28],
 ["Comedy",35],
 ["Horror",27],
 ["Sci-Fi",878],
 ["Romance",10749],
 ["Drama",18],
 ["Animation",16],
 ["Thriller",53],
 ["Crime",80],
 ["Adventure",12]
 ];

 for(const [name,id] of genres){

  const res=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
  const data=await res.json();

  rows.innerHTML+=`
  <h2 class="mt-4">${name}</h2>
  <div class="scroll mb-4">
  ${data.results.map(card).join("")}
  </div>`;

  const cards=rows.lastElementChild.querySelectorAll(".card");
  cards.forEach((c,i)=>c.onclick=()=>openModal(data.results[i]));
 }

}

window.onload=load;

</script>

</body>
</html>
