<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub Ultimate</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ✅ ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }
.hero { height:80vh; position:relative; }
.hero iframe { position:absolute; width:100%; height:100%; }
.overlay { position:absolute; inset:0; background:linear-gradient(to top, black, transparent); }
.searchPage { position:fixed; inset:0; background:black; z-index:200; display:none; overflow-y:auto; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/70 p-4 flex justify-between">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search..." class="bg-gray-800 px-4 py-2 rounded w-1/2">
</nav>

<!-- SEARCH -->
<div id="searchPage" class="searchPage p-4 pt-20">
<button onclick="closeSearch()">← Back</button>
<input id="searchInput2" class="w-full mt-4 p-3 bg-gray-800 rounded">
<div id="searchResults"></div>
</div>

<!-- MOVIE -->
<div id="moviePage" class="searchPage p-4 pt-20">
<button onclick="goHome()">← Back</button>
<div id="movieDetails"></div>
<h2 class="mt-6">Recommended</h2>
<div id="recommendations" class="scroll"></div>
</div>

<!-- EXTRA -->
<div id="extraPage" class="searchPage p-6 pt-20">
<button onclick="goHome()">← Back</button>
<div id="extraContent"></div>
</div>

<!-- HOME -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo"></iframe>
<div class="overlay"></div>
<div class="absolute bottom-10 left-6">
<h1 id="heroTitle"></h1>
<p id="heroDesc"></p>
</div>
</div>

<div class="p-4">

<h2>🔥 Top 10</h2>
<div id="top10" class="scroll"></div>

<!-- ✅ ADS HERE -->
<div class="my-6 text-center">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1234567890"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
</div>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>

<!-- ✅ CATEGORIES -->
<div id="rows"></div>

</div>
</div>

<!-- FOOTER -->
<footer class="p-6 border-t border-gray-700">
<div class="grid md:grid-cols-3 gap-6">

<div>
<h2>MovieHub</h2>
<p>Movies, trailers & streaming discovery.</p>
</div>

<div>
<h3>Links</h3>
<ul>
<li onclick="goHome()">Home</li>
<li onclick="openPage('policy')">Privacy</li>
<li onclick="openPage('terms')">Terms</li>
<li onclick="openPage('support')">Support</li>
<li onclick="openPage('disclaimer')">Disclaimer</li>
</ul>
</div>

<div>
<h3>Feedback</h3>
<form action="https://formsubmit.co/eh710214@gmail.com" method="POST">
<input name="name" placeholder="Name" class="w-full mb-2 p-2 bg-gray-800">
<input name="email" placeholder="Email" class="w-full mb-2 p-2 bg-gray-800">
<textarea name="message" placeholder="Message" class="w-full mb-2 p-2 bg-gray-800"></textarea>
<button class="bg-white text-black px-4 py-2 w-full">Send</button>
</form>
</div>

</div>
</footer>

<script>

const API_KEY="2b670b583329b90bcbad43227626c5f9";

function goHome(){
homePage.style.display="block";
moviePage.style.display="none";
searchPage.style.display="none";
extraPage.style.display="none";
}

// SEARCH
searchInput.onclick=()=>searchPage.style.display="block";

searchInput.oninput=()=>runSearch(searchInput.value);
searchInput2.oninput=()=>runSearch(searchInput2.value);

async function runSearch(q){
if(q.length<2) return;

const r=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
const d=await r.json();

searchResults.innerHTML=d.results.map(m=>`
<div onclick='openMovie(${JSON.stringify(m)})'>
<img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w200'+m.poster_path : ''}">
<p>${m.title}</p>
</div>`).join("");
}

// MOVIE
async function openMovie(m){
moviePage.style.display="block";
homePage.style.display="none";

movieDetails.innerHTML=`
<h1>${m.title}</h1>
<img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w400'+m.poster_path : ''}">
<p>${m.overview}</p>
`;
}

// PAGES
function openPage(type){
extraPage.style.display="block";
homePage.style.display="none";

if(type==="policy"){
extraContent.innerHTML=`<h1>Privacy Policy</h1><p>Your data is safe.</p>`;
}
if(type==="terms"){
extraContent.innerHTML=`<h1>Terms</h1><p>Use responsibly.</p>`;
}
if(type==="support"){
extraContent.innerHTML=`<h1>Support</h1><p>Email: eh710214@gmail.com</p>`;
}
if(type==="disclaimer"){
extraContent.innerHTML=`<h1>Disclaimer</h1><p>No movie hosting.</p>`;
}
}

// LOAD
async function load(){

const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

top10.innerHTML=trending.results.slice(0,10).map(m=>`
<div class="card" onclick='openMovie(${JSON.stringify(m)})'>
<img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w300'+m.poster_path : ''}">
</div>`).join("");

// ✅ CATEGORIES BACK
const genres=[
["Action",28],["Comedy",35],["Horror",27],
["Sci-Fi",878],["Romance",10749],
["Drama",18],["Animation",16],
["Thriller",53],["Crime",80],["Adventure",12]
];

for(const [name,id] of genres){
const r=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
const d=await r.json();

rows.innerHTML+=`
<h2>${name}</h2>
<div class="scroll">
${d.results.map(m=>`
<div class="card" onclick='openMovie(${JSON.stringify(m)})'>
<img src="${m.poster_path ? 'https://image.tmdb.org/t/p/w300'+m.poster_path : ''}">
</div>`).join("")}
</div>`;
}

}

window.onload=load;

</script>

</body>
</html>
