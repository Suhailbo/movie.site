<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }
.scroll { display:flex; overflow-x:auto; gap:16px; }
.scroll::-webkit-scrollbar { display:none; }

.movie-card { min-width:140px; cursor:pointer; transition:0.3s; }
.movie-card:hover { transform:scale(1.08); }

.hero {
 height:65vh;
 display:flex;
 align-items:flex-end;
 padding:30px;
 background-size:cover;
 background-position:center;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-black/90 p-4 flex justify-between z-50">
<h1 class="text-2xl font-bold">🎬 MovieHub</h1>
<div class="flex gap-4">
<span onclick="openSearchPage()" class="cursor-pointer">Search</span>
<span onclick="openWatchlist()" class="cursor-pointer">❤️</span>
</div>
</nav>

<!-- MAIN -->
<div id="mainPage" class="pt-16">

<!-- HERO -->
<div id="hero" class="hero">
<div>
<h1 id="heroTitle" class="text-3xl font-bold mb-3"></h1>
<button onclick="playHeroTrailer()" class="bg-white text-black px-4 py-2 rounded">
▶ Trailer
</button>
</div>
</div>

<div id="rows" class="px-4"></div>

</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black p-4 z-50 overflow-auto">
<button onclick="closeSearchPage()">← Back</button>
<input id="searchInputFull" class="w-full p-3 bg-zinc-800 mt-4 rounded" placeholder="Search movies...">
<div id="searchResults" class="grid grid-cols-3 gap-3 mt-6"></div>
</div>

<!-- DETAILS -->
<div id="detailsPage" class="hidden fixed inset-0 bg-black p-4 z-50 overflow-auto">
<button onclick="closeDetailsPage()">←</button>
<img id="detailsPoster" class="w-40 my-4">
<h1 id="detailsTitle" class="text-xl font-bold"></h1>
<p id="detailsOverview" class="text-gray-400 text-sm"></p>

<div class="flex gap-3 mt-4">
<button onclick="addToWatchlist()" class="bg-green-600 px-3 py-1">+ Save</button>
<button onclick="playTrailer()" class="bg-red-600 px-3 py-1">Trailer</button>
</div>
</div>

<!-- WATCHLIST -->
<div id="watchlistPage" class="hidden fixed inset-0 bg-black p-4 z-50">
<button onclick="closeWatchlist()">←</button>
<div id="watchlistGrid" class="grid grid-cols-3 gap-3"></div>
</div>

<!-- TRAILER -->
<div id="trailerModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center z-50">
<div class="relative w-full max-w-xl">
<button onclick="closeTrailer()" class="absolute -top-8 right-0 text-2xl">✕</button>
<iframe id="trailerFrame" class="w-full aspect-video"></iframe>
</div>
</div>

<script>
const API_KEY="2b670b583329b90bcbad43227626c5f9";

let currentMovie=null;
let watchlist=JSON.parse(localStorage.getItem("watchlist")||"[]");

/* FETCH */
async function fetchMovies(url){
 const res=await fetch(url);
 const data=await res.json();
 return data.results||[];
}

/* CARD */
function createCard(m){
 return `
 <div class="movie-card">
  <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" class="w-full h-36 object-cover rounded">
 </div>`;
}

/* HERO */
function setHero(m){
 hero.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${m.backdrop_path})`;
 heroTitle.textContent=m.title||m.name;
 currentMovie=m;
}

/* LOAD */
async function load(){
 const movies=await fetchMovies(`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`);
 setHero(movies[0]);

 const html=movies.map(createCard).join("");
 rows.innerHTML=`<h2 class="text-xl my-4">Trending</h2><div class="scroll">${html}</div>`;

 rows.querySelectorAll(".movie-card").forEach((c,i)=>{
  c.onclick=()=>showDetails(movies[i]);
 });
}

/* DETAILS */
function showDetails(m){
 currentMovie=m;
 mainPage.style.display="none";
 detailsPage.style.display="block";

 detailsPoster.src=`https://image.tmdb.org/t/p/w300${m.poster_path}`;
 detailsTitle.textContent=m.title||m.name;
 detailsOverview.textContent=m.overview;
}

function closeDetailsPage(){
 detailsPage.style.display="none";
 mainPage.style.display="block";
}

/* SEARCH */
searchInputFull.addEventListener("input", async e=>{
 const q=e.target.value;
 if(q.length<2) return;

 const res=await fetchMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 const list=res.filter(m=>m.poster_path);

 searchResults.innerHTML=list.map(createCard).join("");

 searchResults.querySelectorAll(".movie-card").forEach((c,i)=>{
  c.onclick=()=>{
   closeSearchPage();
   setTimeout(()=>showDetails(list[i]),100);
  };
 });
});

function openSearchPage(){
 mainPage.style.display="none";
 searchPage.style.display="block";
}
function closeSearchPage(){
 searchPage.style.display="none";
 mainPage.style.display="block";
}

/* WATCHLIST */
function addToWatchlist(){
 watchlist.unshift(currentMovie);
 localStorage.setItem("watchlist",JSON.stringify(watchlist));
 alert("Saved!");
}

function openWatchlist(){
 mainPage.style.display="none";
 watchlistPage.style.display="block";
 watchlistGrid.innerHTML=watchlist.map(createCard).join("");
}
function closeWatchlist(){
 watchlistPage.style.display="none";
 mainPage.style.display="block";
}

/* TRAILER */
async function playTrailer(){
 const type=currentMovie.title?"movie":"tv";
 const res=await fetch(`https://api.themoviedb.org/3/${type}/${currentMovie.id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 const vid=data.results[0];
 if(!vid) return;

 trailerFrame.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1`;
 trailerModal.classList.remove("hidden");
}

function playHeroTrailer(){ playTrailer(); }

function closeTrailer(){
 trailerModal.classList.add("hidden");
 trailerFrame.src="";
}

/* START */
window.onload=load;
</script>

</body>
</html>
