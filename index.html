<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub V6 Ultra</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- ADSENSE -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#000; color:white; }
.scroll { display:flex; overflow-x:auto; gap:12px; }
.scroll::-webkit-scrollbar { display:none; }
.card { min-width:140px; cursor:pointer; transition:.3s; }
.card:hover { transform:scale(1.08); }
.hero iframe { width:100%; height:230px; }
</style>
</head>

<body>

<!-- NAV -->
<nav class="sticky top-0 bg-black/80 backdrop-blur flex justify-between items-center p-3 z-50">
<h1 onclick="goHome()" class="font-bold cursor-pointer">🎬 MovieHub</h1>
<input id="searchInput" placeholder="Search movies..." 
class="bg-gray-900 px-3 py-1 rounded text-sm w-1/2">
</nav>

<!-- BANNER -->
<div class="text-center py-2 bg-gradient-to-r from-purple-600 to-pink-600 text-sm font-bold">
🔥 Discover • Watch • Stream Movies Anywhere
</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeSearch()" class="mb-4 text-lg">← Back</button>
<input id="searchInput2" class="w-full bg-gray-900 p-3 mb-4 rounded">
<div id="searchResults"></div>
</div>

<!-- MOVIE -->
<div id="moviePage" class="hidden fixed inset-0 bg-black z-50 p-4 overflow-y-auto">
<button onclick="closeMoviePage()" class="mb-4 text-lg">← Back</button>

<div id="movieDetails"></div>

<h2 class="mt-8 text-xl font-bold">🤖 Recommended</h2>
<div id="recommendations" class="scroll mt-3"></div>
</div>

<!-- LEGAL -->
<div id="privacyPage" class="hidden fixed inset-0 bg-black p-6 z-50">
<button onclick="goHome()">← Back</button>
<h1 class="text-2xl mt-4 font-bold">Privacy Policy</h1>
<p class="mt-3 text-gray-400">We do not sell your data.</p>
</div>

<div id="termsPage" class="hidden fixed inset-0 bg-black p-6 z-50">
<button onclick="goHome()">← Back</button>
<h1 class="text-2xl mt-4 font-bold">Terms</h1>
<p class="mt-3 text-gray-400">Use responsibly.</p>
</div>

<!-- HOME -->
<div id="homePage">

<div class="hero">
<iframe id="heroVideo" allow="autoplay"></iframe>
</div>

<div class="px-4 mt-2">
<h1 id="heroTitle" class="text-2xl font-bold"></h1>
<p id="heroDesc" class="text-gray-300 text-sm mt-1 line-clamp-2"></p>

<div class="flex gap-3 mt-3">
<button onclick="openMovie(heroMovie)" class="flex-1 bg-white text-black py-2 rounded">▶ Trailer</button>
<button onclick="openMovie(heroMovie)" class="flex-1 bg-green-600 py-2 rounded">📥 Watch</button>
</div>
</div>

<!-- ADS -->
<div class="my-4 px-4 text-center max-w-4xl mx-auto">
<ins class="adsbygoogle"
style="display:block"
data-ad-client="ca-pub-2257272049115568"
data-ad-slot="1411335960"
data-ad-format="auto"
data-full-width-responsive="true"></ins>
<script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
</div>

<div class="px-4">
<h2 class="text-lg mb-2">🔥 Top 10</h2>
<div id="top10" class="scroll mb-6"></div>

<div id="rows"></div>
</div>

</div>

<!-- FOOTER -->
<footer class="bg-black border-t border-gray-800 mt-10 px-6 py-8 text-sm">
<div class="grid md:grid-cols-3 gap-6">

<div>
<h2 class="font-bold">🎬 MovieHub</h2>
<p class="text-gray-400">Discover movies & trailers</p>
</div>

<div>
<h3>Links</h3>
<ul class="text-gray-400 space-y-1">
<li onclick="goHome()" class="cursor-pointer">Home</li>
<li onclick="openPage('privacyPage')" class="cursor-pointer">Privacy</li>
<li onclick="openPage('termsPage')" class="cursor-pointer">Terms</li>
</ul>
</div>

<div>
<h3>Feedback</h3>
<form action="https://formsubmit.co/eh710214@gmail.com" method="POST">
<input name="name" placeholder="Name" class="w-full mb-2 bg-gray-800 p-2 rounded">
<input name="email" placeholder="Email" class="w-full mb-2 bg-gray-800 p-2 rounded">
<textarea name="message" placeholder="Message" class="w-full mb-2 bg-gray-800 p-2 rounded"></textarea>
<button class="bg-white text-black w-full p-2 rounded">Send</button>
</form>
</div>

</div>
<div class="text-center text-gray-500 mt-6 text-xs">© 2026 MovieHub</div>
</footer>

<script>

const API_KEY="fc53416dd4f13229c0a99225cf54033c";

const homePage=document.getElementById("homePage");
const moviePage=document.getElementById("moviePage");
const searchPage=document.getElementById("searchPage");

let heroMovie;

// NAV
function goHome(){
 document.querySelectorAll("[id$='Page']").forEach(p=>p.classList.add("hidden"));
 homePage.style.display="block";
}

function openPage(id){
 document.querySelectorAll("[id$='Page']").forEach(p=>p.classList.add("hidden"));
 document.getElementById(id).classList.remove("hidden");
}

// BACK
function closeMoviePage(){
 moviePage.classList.add("hidden");
 homePage.style.display="block";
}

// SEARCH
searchInput.onclick=()=>searchPage.classList.remove("hidden");

searchInput.oninput=e=>runSearch(e.target.value);
searchInput2.oninput=e=>runSearch(e.target.value);

function closeSearch(){ searchPage.classList.add("hidden"); }

// SEARCH FUNC
async function runSearch(q){
 if(q.length<2){ searchResults.innerHTML=""; return; }

 const res=await fetch(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 const data=await res.json();

 searchResults.innerHTML=data.results.map(m=>`
 <div onclick='openMovie(${JSON.stringify(m)})'
 class="flex gap-3 bg-gray-900 p-3 mb-3 rounded cursor-pointer">
 <img src="https://image.tmdb.org/t/p/w200${m.poster_path}" class="w-16">
 <div>${m.title}</div>
 </div>`).join("");
}

// PROVIDERS
async function getProviders(id){
 const r=await fetch(`https://api.themoviedb.org/3/movie/${id}/watch/providers?api_key=${API_KEY}`);
 const d=await r.json();
 return d.results?.NG || d.results?.US || {};
}

// MOVIE
async function openMovie(m){

 homePage.style.display="none";
 moviePage.classList.remove("hidden");

 const providerData=await getProviders(m.id);
 const providers=providerData.flatrate || [];
 const link=providerData.link;

 const vid=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
 const trailer=vid.results.find(v=>v.type==="Trailer");

 movieDetails.innerHTML=`
 <img src="https://image.tmdb.org/t/p/w400${m.poster_path}" class="rounded mb-4">

 <h1 class="text-2xl font-bold">${m.title}</h1>
 <p class="text-yellow-400">⭐ ${m.vote_average}</p>
 <p class="text-gray-300 my-3">${m.overview||""}</p>

 <button onclick="playTrailer('${trailer?.key}')"
 class="bg-white text-black px-4 py-2 rounded">▶ Trailer</button>

 <div id="trailerBox" class="mt-4"></div>

 <div class="mt-6">
 <h3 class="text-lg font-bold mb-2">📺 Available On</h3>

 ${providers.length ? providers.map(p=>`
 <a href="${link}" target="_blank"
 class="flex items-center gap-3 bg-gray-900 p-3 rounded mb-2">

 <img src="https://image.tmdb.org/t/p/w45${p.logo_path}" class="w-8">

 <div>
 <p>${p.provider_name}</p>
 ${p.provider_name==="Netflix" ? '<span class="text-red-500 text-sm">🔥 Popular</span>' : ''}
 </div>

 </a>`).join("") : `<p class="text-gray-400">Not available</p>`}

 </div>
 `;

 // recommendations
 const rec=await fetch(`https://api.themoviedb.org/3/movie/${m.id}/recommendations?api_key=${API_KEY}`).then(r=>r.json());

 recommendations.innerHTML=rec.results.slice(0,10).map(r=>`
 <div class="card" onclick='openMovie(${JSON.stringify(r)})'>
 <img src="https://image.tmdb.org/t/p/w300${r.poster_path}">
 </div>`).join("");
}

// trailer
function playTrailer(key){
 trailerBox.innerHTML=`<iframe width="100%" height="250"
 src="https://www.youtube.com/embed/${key}?autoplay=1"></iframe>`;
}

// LOAD
async function load(){

 const trending=await fetch(`https://api.themoviedb.org/3/trending/movie/week?api_key=${API_KEY}`).then(r=>r.json());

 heroMovie=trending.results[0];

 heroTitle.innerText=heroMovie.title;
 heroDesc.innerText=heroMovie.overview;

 const t=await fetch(`https://api.themoviedb.org/3/movie/${heroMovie.id}/videos?api_key=${API_KEY}`).then(r=>r.json());
 const trailer=t.results.find(v=>v.type==="Trailer");

 if(trailer) heroVideo.src=`https://www.youtube.com/embed/${trailer.key}?autoplay=1&mute=1`;

 top10.innerHTML=trending.results.slice(0,10).map(m=>`
 <div class="card" onclick='openMovie(${JSON.stringify(m)})'>
 <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
 </div>`).join("");

 // categories restored
 const genres=[["Action",28],["Comedy",35],["Horror",27],["Drama",18],["Animation",16]];

 rows.innerHTML="";

 for(const [name,id] of genres){
  const res=await fetch(`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=${id}`);
  const data=await res.json();

  rows.innerHTML+=`
  <h2 class="mt-6 font-bold">${name}</h2>
  <div class="scroll mb-4">
  ${data.results.map(m=>`
   <div class="card" onclick='openMovie(${JSON.stringify(m)})'>
   <img src="https://image.tmdb.org/t/p/w300${m.poster_path}">
   </div>`).join("")}
  </div>`;
 }
}

window.onload=load;

</script>

</body>
</html>
