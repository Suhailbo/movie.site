<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MovieHub</title>

<script src="https://cdn.tailwindcss.com"></script>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2257272049115568"
crossorigin="anonymous"></script>

<style>
body { background:#0a0a0a; color:white; font-family:sans-serif; }
.scroll { display:flex; overflow-x:auto; gap:20px; }
.scroll::-webkit-scrollbar { display:none; }

.movie-card { min-width:180px; cursor:pointer; transition:0.3s; }
.movie-card:hover { transform:scale(1.08); }

.hero {
  height:65vh;
  display:flex;
  align-items:flex-end;
  padding:40px;
  background-size:cover;
}
</style>
</head>

<body>

<!-- NAV -->
<nav class="fixed top-0 w-full bg-black/90 p-4 flex justify-between z-50">
<h1 class="text-3xl font-bold">🎬 MovieHub</h1>
<div class="flex gap-6">
<span onclick="openSearchPage()" class="cursor-pointer">Search</span>
<span onclick="openWatchlist()" class="cursor-pointer">❤️ Watchlist</span>
</div>
</nav>

<div id="mainPage" class="pt-20">

<!-- HERO -->
<div id="hero" class="hero">
<div>
<h1 id="heroTitle" class="text-5xl font-bold mb-4"></h1>
<button onclick="playHeroTrailer()" class="bg-white text-black px-6 py-3 rounded-xl">
▶ Watch Trailer
</button>
</div>
</div>

<div id="rows" class="px-6"></div>

<!-- FOOTER -->
<footer class="mt-16 p-8 border-t border-gray-800 text-gray-300">
<div class="grid md:grid-cols-4 gap-6 text-lg">

<div>
<h3 class="font-bold text-white">MovieHub</h3>
<p>Discover movies, trailers, anime and more.</p>
</div>

<div>
<p onclick="openPage('about')" class="cursor-pointer">About</p>
<p onclick="openPage('contact')" class="cursor-pointer">Contact</p>
<p onclick="openPage('privacy')" class="cursor-pointer">Privacy Policy</p>
<p onclick="openPage('terms')" class="cursor-pointer">Terms</p>
</div>

<div>
<p>Email: eh710214@gmail.com</p>
<p>Phone: +2349049696168</p>
</div>

<div>
<p>We do not host movies. All content belongs to owners.</p>
</div>

</div>
<p class="text-center mt-6 text-sm">© 2026 MovieHub</p>
</footer>

</div>

<!-- INFO PAGE -->
<div id="infoPage" class="hidden fixed inset-0 bg-black p-6 z-50 overflow-auto">
<button onclick="closeInfoPage()">← Back</button>
<div id="infoContent" class="mt-4 text-lg"></div>
</div>

<!-- DETAILS -->
<div id="detailsPage" class="hidden fixed inset-0 bg-black p-6 z-50 overflow-auto">
<button onclick="closeDetailsPage()">←</button>
<img id="detailsPoster" class="w-64 my-6">
<h1 id="detailsTitle" class="text-3xl font-bold"></h1>
<p id="detailsOverview" class="text-gray-400"></p>

<div class="flex flex-wrap gap-4 mt-6">
<button onclick="playTrailerFromDetails()" class="bg-red-600 px-6 py-3">Trailer</button>
<button onclick="openPlatform('netflix')" class="bg-white text-black px-6 py-3">Netflix</button>
<button onclick="openPlatform('prime')" class="bg-yellow-500 px-6 py-3">Prime</button>
<button onclick="openPlatform('disney')" class="bg-blue-500 px-6 py-3">Disney+</button>
<button onclick="openPlatform('google')" class="bg-gray-700 px-6 py-3">Search</button>
</div>
</div>

<!-- SEARCH -->
<div id="searchPage" class="hidden fixed inset-0 bg-black p-6 z-50">
<button onclick="closeSearchPage()">←</button>
<input id="searchInputFull" class="w-full p-3 my-4 bg-zinc-800">
<div id="searchResults" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</div>

<!-- WATCHLIST -->
<div id="watchlistPage" class="hidden fixed inset-0 bg-black p-6 z-50">
<button onclick="closeWatchlist()">←</button>
<div id="watchlistGrid" class="grid grid-cols-2 md:grid-cols-5 gap-4"></div>
</div>

<!-- TRAILER MODAL -->
<div id="trailerModal" class="hidden fixed inset-0 bg-black/90 flex justify-center items-center z-50" onclick="closeTrailer(event)">
<div class="relative w-full max-w-3xl">
<button onclick="closeTrailer()" class="absolute -top-10 right-0 text-3xl">✕</button>
<iframe id="trailerFrame" class="w-full aspect-video"></iframe>
</div>
</div>

<script>
const API_KEY="2b670b583329b90bcbad43227626c5f9";

let currentMovie=null;
let watchlist=JSON.parse(localStorage.getItem("watchlist")||"[]");
let continueList=JSON.parse(localStorage.getItem("continue")||"[]");
let userCountry="US";

async function detectLocation(){
 try{
  const res=await fetch("https://ipapi.co/json");
  const data=await res.json();
  userCountry=data.country_code||"US";
 }catch(e){}
}

const baseRows=[
{title:"🔥 Trending",url:`https://api.themoviedb.org/3/trending/all/week?api_key=${API_KEY}`},
{title:"🎬 Movies",url:`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`},
{title:"📺 TV Shows",url:`https://api.themoviedb.org/3/tv/popular?api_key=${API_KEY}`},
{title:"💥 Action",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=28`},
{title:"👻 Horror",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=27`},
{title:"🚀 Sci-Fi",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_genres=878`},
{title:"🎌 Anime",url:`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_keywords=210024`},
{title:"🇰🇷 K-Drama",url:`https://api.themoviedb.org/3/discover/tv?api_key=${API_KEY}&with_origin_country=KR`},
{title:"🇮🇳 Bollywood",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=IN`},
{title:"🇨🇳 Chinese",url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&with_origin_country=CN`}
];

async function fetchMovies(url){
 const res=await fetch(url);
 const data=await res.json();
 return data.results||[];
}

function createCard(movie){
 return `<div class="movie-card">
 <img src="https://image.tmdb.org/t/p/w300${movie.poster_path}" class="rounded-xl">
 </div>`;
}

function setHero(movie){
 hero.style.backgroundImage=`url(https://image.tmdb.org/t/p/original${movie.backdrop_path})`;
 heroTitle.textContent=movie.title||movie.name;
 currentMovie=movie;
}

function startHeroRotation(movies){
 setHero(movies[0]);
 setInterval(()=>{
  setHero(movies[Math.floor(Math.random()*movies.length)]);
 },10000);
}

async function loadRows(){
 rows.innerHTML="";

 const localRow={
  title:`🌍 Trending in ${userCountry}`,
  url:`https://api.themoviedb.org/3/discover/movie?api_key=${API_KEY}&region=${userCountry}`
 };

 const allRows=[localRow,...baseRows];

 for(let row of allRows){
  const movies=(await fetchMovies(row.url)).filter(m=>m.poster_path);

  const div=document.createElement("div");
  div.innerHTML=`
  <h2 class="text-3xl font-bold mt-10 mb-6">${row.title}</h2>
  <div class="scroll mb-8">${movies.map(createCard).join("")}</div>
  `;
  rows.appendChild(div);

  div.querySelectorAll(".movie-card").forEach((c,i)=>{
    c.onclick=()=>showDetails(movies[i]);
  });

  if(row.title.includes("Trending")){
    startHeroRotation(movies);
  }
 }

 loadRecommended();
 loadContinue();
}

async function loadRecommended(){
 const movies=await fetchMovies(`https://api.themoviedb.org/3/movie/popular?api_key=${API_KEY}`);
 const random=movies.sort(()=>0.5-Math.random()).slice(0,10);

 const section=document.createElement("div");
 section.innerHTML=`
 <h2 class="text-3xl font-bold mt-10 mb-6">🎯 Recommended</h2>
 <div class="scroll mb-8">${random.map(createCard).join("")}</div>
 `;
 rows.prepend(section);
}

function loadContinue(){
 if(continueList.length===0) return;

 const section=document.createElement("div");
 section.innerHTML=`
 <h2 class="text-3xl font-bold mt-10 mb-6">⏯ Continue Watching</h2>
 <div class="scroll mb-8">${continueList.map(createCard).join("")}</div>
 `;
 rows.prepend(section);
}

function saveContinue(movie){
 continueList.unshift(movie);
 continueList=continueList.slice(0,10);
 localStorage.setItem("continue",JSON.stringify(continueList));
}

function showDetails(movie){
 currentMovie=movie;
 mainPage.style.display="none";
 detailsPage.style.display="block";

 detailsPoster.src=`https://image.tmdb.org/t/p/w500${movie.poster_path}`;
 detailsTitle.textContent=movie.title||movie.name;
 detailsOverview.textContent=movie.overview;

 setTimeout(()=>{
  if(currentMovie===movie){
   playTrailerFromDetails();
   saveContinue(movie);
  }
 },8000);
}

function closeDetailsPage(){
 detailsPage.style.display="none";
 mainPage.style.display="block";
}

function openSearchPage(){ mainPage.style.display="none"; searchPage.style.display="block"; }
function closeSearchPage(){ searchPage.style.display="none"; mainPage.style.display="block"; }

searchInputFull.addEventListener("input",async e=>{
 const q=e.target.value;
 if(q.length<3) return;

 const res=await fetchMovies(`https://api.themoviedb.org/3/search/movie?api_key=${API_KEY}&query=${q}`);
 searchResults.innerHTML=res.filter(m=>m.poster_path).map(createCard).join("");
});

function openWatchlist(){
 mainPage.style.display="none";
 watchlistPage.style.display="block";
 watchlistGrid.innerHTML=watchlist.map(createCard).join("");
}

function closeWatchlist(){
 watchlistPage.style.display="none";
 mainPage.style.display="block";
}

function openPlatform(p){
 const t=encodeURIComponent(currentMovie.title||currentMovie.name);
 window.open(`https://www.google.com/search?q=${t}+watch`);
}

async function playTrailerFromDetails(){
 const type=currentMovie.title?"movie":"tv";
 const res=await fetch(`https://api.themoviedb.org/3/${type}/${currentMovie.id}/videos?api_key=${API_KEY}`);
 const data=await res.json();
 const vid=data.results[0];
 if(!vid) return;

 trailerFrame.src=`https://www.youtube.com/embed/${vid.key}?autoplay=1`;
 trailerModal.classList.remove("hidden");
}

function playHeroTrailer(){ playTrailerFromDetails(); }

function closeTrailer(e){
 if(e && e.target !== trailerModal) return;
 trailerModal.classList.add("hidden");
 trailerFrame.src="";
}

document.addEventListener("keydown",e=>{
 if(e.key==="Escape") closeTrailer();
});

function openPage(type){
 mainPage.style.display="none";
 infoPage.style.display="block";

 if(type==="contact"){
  infoContent.innerHTML="Email: eh710214@gmail.com<br>Phone: +2349049696168";
 } else {
  infoContent.innerHTML="Information page";
 }
}

function closeInfoPage(){
 infoPage.style.display="none";
 mainPage.style.display="block";
}

window.onload=async()=>{
 await detectLocation();
 loadRows();
};
</script>

</body>
</html>
